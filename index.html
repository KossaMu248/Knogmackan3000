function buildTextures(scene){
  // Build 10×16 chars for player/grunt/heavy
  const charTypes=['player','grunt','heavy'];
  charTypes.forEach(ct=>{
    const pd=PAL_DEFS[ct];
    Object.entries(BODY).forEach(([fname,rows])=>{
      const cols=rows[0].length, nrows=rows.length;
      const g=scene.make.graphics({add:false});
      for(let r=0;r<nrows;r++){
        for(let c=0;c<(rows[r]||'').length;c++){
          const ch=rows[r][c]; if(ch===' ') continue;
          const ckey=pd[ch]; if(!ckey) continue;
          const col=C[ckey]??0xffffff;
          g.fillStyle(col,1); g.fillRect(c*PX,r*PX,PX,PX);
          g.fillStyle(0,0.18); g.fillRect(c*PX,r*PX,1,PX); g.fillRect(c*PX,r*PX,PX,1);
        }
      }
      g.generateTexture(`${ct}_${fname}`,cols*PX,nrows*PX); g.destroy();
    });
  });

  // Build 12×20 boss frames (boss1 + boss2 reuse same shapes, different palettes)
  ['boss','boss2'].forEach(btype=>{
    const bp=PAL_DEFS[btype];
    const prefix=btype==='boss'?'boss_':'boss2_';
    Object.entries(BOSS_BODY).forEach(([fname,rows])=>{
      const cols=rows[0].length, nrows=rows.length;
      const g=scene.make.graphics({add:false});
      for(let r=0;r<nrows;r++){
        for(let c=0;c<(rows[r]||'').length;c++){
          const ch=rows[r][c]; if(ch===' ') continue;
          const ckey=bp[ch]; if(!ckey) continue;
          const col=C[ckey]??0xffffff;
          g.fillStyle(col,1); g.fillRect(c*PX,r*PX,PX,PX);
          g.fillStyle(0,0.18); g.fillRect(c*PX,r*PX,1,PX); g.fillRect(c*PX,r*PX,PX,1);
        }
      }
      g.generateTexture(`${prefix}${fname}`,cols*PX,nrows*PX); g.destroy();
    });
  });

  // Utility textures
  const mk=(key,w,h,fn)=>{const g=scene.make.graphics({add:false});fn(g);g.generateTexture(key,w,h);g.destroy();};
  mk('blood',8,8,g=>{g.fillStyle(C.blood,1);g.fillCircle(4,4,4);});
  mk('spark',4,4,g=>{g.fillStyle(C.spark,1);g.fillRect(0,0,4,4);});
  mk('ring',28,28,g=>{g.lineStyle(2,C.white,1);g.strokeCircle(14,14,12);});
  mk('expl',40,40,g=>{g.fillStyle(C.orange,0.65);g.fillCircle(20,20,20);});
  mk('pdrop',10,10,g=>{g.fillStyle(C.bZ,1);g.fillCircle(5,5,5);}); // pee drop
  mk('puddle',140,32,g=>{g.fillStyle(C.bZ,0.60);g.fillEllipse(70,16,140,32);}); // puddle
}

//  IMPACT ENGINE
// ════════════════════════════════════════════════════════════════
class ImpactEngine{
  constructor(s){this.scene=s;this._frozen=false;}
  onHit(x,y,hd,right,explosive){
    this.shake(hd.shake,hd.stopMs+80);
    this.stop(hd.stopMs);
    this.blood(x,y,right?1:-1,hd.dmg);
    this.sparks(x,y,hd.shake);
    this.ring(x,y,hd.shake>5?C.yellow:C.white);
    if(hd.kbY<-280) this.flare(x,y);
    if(explosive) this.explode(x,y);
  }
  shake(i,d){this.scene.cameras.main.shake(d,i*0.001);}
  stop(ms){
    if(this._frozen)return;
    this._frozen=true;
    this.scene.physics.world.timeScale=18;
    setTimeout(()=>{if(this.scene?.physics)this.scene.physics.world.timeScale=1;this._frozen=false;},ms);
  }
  blood(x,y,dir,amt){
    const s=this.scene,n=Math.min(4+Math.floor(amt/4),14);
    for(let i=0;i<n;i++){
      const a=Phaser.Math.DegToRad(Phaser.Math.Between(-55,55)+(dir>0?0:180));
      const sp=Phaser.Math.Between(90,280);
      const d=s.add.image(x,y,'blood').setDepth(5).setTint(i%3?C.blood:C.bloodBrt).setScale(Phaser.Math.FloatBetween(0.6,1.6));
      s.tweens.add({targets:d,x:x+Math.cos(a)*sp*.55,y:y+Math.sin(a)*sp*.55-40,alpha:0,
        duration:Phaser.Math.Between(200,480),ease:'Cubic.Out',
        onComplete:()=>{
          if(d.y>FLOOR_Y-30){const dec=s.add.image(d.x,FLOOR_Y-3,'blood').setScale(0.7).setAlpha(0.5).setTint(0x880000).setDepth(1);s.time.delayedCall(8000,()=>s.tweens.add({targets:dec,alpha:0,duration:1000,onComplete:()=>dec.destroy()}));}
          d.destroy();
        }});
    }
  }
  sparks(x,y,k){
    const s=this.scene;
    for(let i=0;i<5+k*2;i++){
      const sp=s.add.image(x,y,'spark').setDepth(6).setTint(i%2?C.yellow:C.spark);
      const a=Phaser.Math.FloatBetween(0,Math.PI*2),v=Phaser.Math.Between(120,340);
      s.tweens.add({targets:sp,x:x+Math.cos(a)*v*.4,y:y+Math.sin(a)*v*.4,scaleX:0,scaleY:0,alpha:0,duration:Phaser.Math.Between(80,220),ease:'Quad.Out',onComplete:()=>sp.destroy()});
    }
  }
  ring(x,y,col){const r=this.scene.add.image(x,y,'ring').setTint(col).setScale(0.3).setDepth(7);this.scene.tweens.add({targets:r,scaleX:3.5,scaleY:3.5,alpha:0,duration:220,ease:'Quad.Out',onComplete:()=>r.destroy()});}
  flare(x,y){const g=this.scene.add.graphics().setDepth(7);g.fillStyle(C.yellow,.85);g.fillCircle(0,0,18);g.setPosition(x,y);this.scene.tweens.add({targets:g,y:y-70,alpha:0,scaleX:1.8,scaleY:2.5,duration:320,ease:'Quad.Out',onComplete:()=>g.destroy()});}
  explode(x,y){for(let i=0;i<3;i++){const ex=this.scene.add.image(x+Phaser.Math.Between(-18,18),y+Phaser.Math.Between(-12,12),'expl').setDepth(8).setScale(.5).setTint(i===0?C.orange:i===1?C.yellow:C.red);this.scene.tweens.add({targets:ex,scaleX:2+i,scaleY:2+i,alpha:0,duration:180+i*60,ease:'Quad.Out',onComplete:()=>ex.destroy()});}this.sparks(x,y,6);this.shake(5,.004);}
  flash(t){t.setTintFill(0xffffff);this.scene.time.delayedCall(70,()=>{if(t.active)t.clearTint();});}
  dmgTxt(x,y,n,launch,col){
    const c=col?('#'+col.toString(16).padStart(6,'0')):launch?'#ffee00':'#ff5555';
    const t=this.scene.add.text(x,y,launch?`${n}!!`:`${n}`,{fontFamily:'Impact, Arial Black',fontSize:launch?'30px':'22px',color:c,stroke:'#000',strokeThickness:5}).setOrigin(.5,.5).setDepth(8);
    this.scene.tweens.add({targets:t,y:y-65,alpha:0,scaleX:launch?1.6:1,scaleY:launch?1.6:1,duration:750,ease:'Quad.Out',onComplete:()=>t.destroy()});
  }
}

//  COMBO SYSTEM
// ════════════════════════════════════════════════════════════════
class ComboSys{
  constructor(){this.n=0;this._t=null;this.win=1800;this.onChange=null;this.onEnd=null;}
  hit(){this.n++;if(this._t)clearTimeout(this._t);if(this.onChange)this.onChange(this.n);this._t=setTimeout(()=>{const c=this.n;this.n=0;if(this.onChange)this.onChange(0);if(this.onEnd&&c>=2)this.onEnd(c);},this.win);}
  reset(){if(this._t)clearTimeout(this._t);this.n=0;if(this.onChange)this.onChange(0);}
}

//  PLAYER
// ════════════════════════════════════════════════════════════════
const PS={IDLE:0,WALK:1,JUMP:2,ATK:3,HURT:4,DEAD:5,GRAB:6};

class Player extends Phaser.Physics.Arcade.Sprite{
  constructor(s,x,y){
    super(s,x,y,'player_idle');
    s.add.existing(this);s.physics.add.existing(this);
    this.setOrigin(.5,1).setDepth(4);
    // 60×96 sprite → body offset so body bottom = y
    this.body.setSize(34,68).setOffset(13,28);
    this.body.setCollideWorldBounds(true);

    this.ps=PS.IDLE;this.hp=100;this.maxHp=100;
    this.facing=1;this.chain=0;this.chainT=0;this.CWIN=420;
    this.atkCd=0;this.curAtk=null;this.hb=null;this.iF=0;
    this._wF=0;this._wT=0;this.grabbed=null;this.grabT=0;
    this.speedB=0;

    const kb=s.input.keyboard,K=Phaser.Input.Keyboard.KeyCodes;
    this.K={
      L:[kb.addKey(K.A),kb.addKey(K.LEFT)],
      R:[kb.addKey(K.D),kb.addKey(K.RIGHT)],
      J:[kb.addKey(K.W),kb.addKey(K.UP),kb.addKey(K.SPACE)],
      P:[kb.addKey(K.J),kb.addKey(K.Z)],
      K:[kb.addKey(K.K),kb.addKey(K.X)],
      G:[kb.addKey(K.G),kb.addKey(K.V)],
      U:[kb.addKey(K.W),kb.addKey(K.UP)],
    };
  }
  dn(a){return this.K[a].some(k=>k.isDown);}
  jd(a){return this.K[a].some(k=>Phaser.Input.Keyboard.JustDown(k));}
  get onGnd(){return this.body.blocked.down;}

  preUpdate(t,dt){
    super.preUpdate(t,dt);
    // Hard floor clamp — belt-and-suspenders in case collider misses one frame
    if(this.body&&this.body.bottom>FLOOR_Y){this.body.y=FLOOR_Y-this.body.height;this.body.velocity.y=0;}
    if(this.ps===PS.DEAD)return;
    this.iF=Math.max(0,this.iF-dt);
    this.atkCd=Math.max(0,this.atkCd-dt);
    this.chainT=Math.max(0,this.chainT-dt);
    this.speedB=Math.max(0,this.speedB-dt);
    if(this.chainT<=0)this.chain=0;

    const pN=this.jd('P'),kN=this.jd('K'),gN=this.jd('G'),jN=this.jd('J');
    const goL=this.dn('L'),goR=this.dn('R');

    // GRAB hold
    if(this.ps===PS.GRAB){
      if(this.grabbed&&this.grabbed.active&&this.grabbed.es!==ES.DEAD){
        this.grabbed.x=this.x+this.facing*50;
        this.grabbed.y=this.y-6;
        this.grabbed.body.setVelocity(0,0);
        this.grabT-=dt;
        if(gN||this.grabT<=0)this._throw();
      } else {this.ps=this.onGnd?PS.IDLE:PS.JUMP;this.grabbed=null;}
      this._tex();return;
    }

    // Attack input
    if(gN&&this.atkCd<=0&&this.ps!==PS.HURT){this._tryGrab();return;}
    if((pN||kN)&&this.atkCd<=0&&this.ps!==PS.HURT){this._atk(kN?'KICK':null);return;}

    // Move
    if(this.ps!==PS.ATK&&this.ps!==PS.HURT){
      const spd=225+(this.speedB>0?85:0);
      if(goL){this.setVelocityX(-spd);this.facing=-1;this.setFlipX(true);if(this.onGnd)this.ps=PS.WALK;}
      else if(goR){this.setVelocityX(spd);this.facing=1;this.setFlipX(false);if(this.onGnd)this.ps=PS.WALK;}
      else{this.setVelocityX(0);if(this.onGnd)this.ps=PS.IDLE;}
      if(jN&&this.onGnd){this.setVelocityY(-780);this.ps=PS.JUMP;this.scene.ie.sparks(this.x,this.y,1);}
    }
    if(this.ps===PS.JUMP&&this.onGnd){this.ps=PS.IDLE;this.scene.ie.sparks(this.x,this.y,2);}
    this._wT+=dt;
    if(this.ps===PS.WALK&&this._wT>110){this._wT=0;this._wF^=1;}
    this._tex();
  }

  _tryGrab(){
    let near=null,minD=100;
    for(const e of this.scene.enemies.getChildren()){
      if(!e.active||e.es===ES.DEAD||e.es===ES.GRAB)continue;
      const d=Math.abs(e.x-this.x);if(d<minD){minD=d;near=e;}
    }
    if(!near){this._atk(null);return;}
    near.es=ES.GRAB;near.body.setVelocity(0,0);
    this.grabbed=near;this.grabT=1800;this.ps=PS.GRAB;
    this.facing=near.x>=this.x?1:-1;this.setFlipX(this.facing<0);
    this.scene.ie.shake(2,100);
    this.scene._pop('GRAB!',C.cyan,this.x,this.y-100,true);
  }

  _throw(){
    const e=this.grabbed;this.grabbed=null;
    this.ps=this.onGnd?PS.IDLE:PS.JUMP;this.atkCd=260;
    if(!e||!e.active||e.es===ES.DEAD)return;
    const mult=this.scene.muts?.GRAPPLER?2:1;
    const dmg=Math.round(HITS.THROW.dmg*mult);
    e.es=ES.THROWN;
    e.body.setVelocity(this.facing*360,-300);
    this.scene.time.delayedCall(60,()=>{
      if(e.active&&e.es!==ES.DEAD){
        e._applyDmg(dmg,this.x);
        this.scene.ie.onHit(e.x,e.y-50,HITS.THROW,this.facing>0);
        this.scene.ie.dmgTxt(e.x,e.y-90,dmg,true);
        this.scene.cs.hit();
        this.scene._pop('LAUNCH!',C.yellow,GW-100,FLOOR_Y-80,false);
      }
    });
  }

  _atk(force){
    const mB=this.scene.muts?.BERSERKER;
    let tp;
    if(force==='KICK'){tp='KICK';this.chain=0;}
    else{const sq=['JAB','CROSS','UPPERCUT'];tp=sq[this.chain%3];this.chain=(this.chain%3)+1;}
    this.chainT=mB?640:this.CWIN;
    this.curAtk=tp;this.ps=PS.ATK;
    const dur={JAB:200,CROSS:290,UPPERCUT:390,KICK:280}[tp];
    const d=mB?Math.round(dur*0.6):dur;
    this.atkCd=d;
    this.scene.time.delayedCall(d*.12,()=>{
      const dir=this.facing,hy=tp==='UPPERCUT'?this.y-75:this.y-42;
      this.hb={x:this.x+dir*56,y:hy,w:74,h:52,hd:HITS[tp],active:true};
      this.scene.time.delayedCall(d*.38,()=>{if(this.hb)this.hb.active=false;});
    });
    this.scene.time.delayedCall(d*.78,()=>{if(this.ps===PS.ATK){this.ps=this.onGnd?PS.IDLE:PS.JUMP;this.curAtk=null;}});
  }

  _tex(){
    const k=(()=>{switch(this.ps){
      case PS.ATK:return{JAB:'player_jab',CROSS:'player_cross',UPPERCUT:'player_upper',KICK:'player_kick'}[this.curAtk]||'player_jab';
      case PS.WALK:return this._wF?'player_walk2':'player_walk1';
      case PS.HURT:return 'player_hurt';case PS.JUMP:return 'player_air';
      case PS.GRAB:return 'player_grab';default:return 'player_idle';
    }})();
    if(this.texture.key!==k)this.setTexture(k);
  }

  hit(amt,kbX,kbY,fromX){
    if(this.iF>0)return;
    const dmg=this.scene.muts?.IRONSKIN?Math.round(amt*.7):amt;
    this.hp=Math.max(0,this.hp-dmg);this.iF=500;
    this.setVelocityX(kbX*(fromX<this.x?1:-1));this.setVelocityY(kbY);
    this.ps=PS.HURT;if(this.grabbed){this.grabbed.es=ES.IDLE;this.grabbed=null;}
    this.scene.time.delayedCall(320,()=>{if(this.ps===PS.HURT)this.ps=this.onGnd?PS.IDLE:PS.JUMP;});
    if(this.hp<=0){this.ps=PS.DEAD;this.scene.time.delayedCall(200,()=>this.scene.events.emit('playerDead'));}
    this.scene.events.emit('playerHp',this.hp);
    this.scene.ie.flash(this);
  }
}

// ════════════════════════════════════════════════════════════════
//  ENEMY BASE
// ════════════════════════════════════════════════════════════════
const ES={IDLE:0,WALK:1,ATK:2,HURT:3,LAUNCHED:4,GRAB:5,THROWN:6,DEAD:7};

class Enemy extends Phaser.Physics.Arcade.Sprite{
  constructor(s,x,y,type='grunt'){
    super(s,x,y,`${type}_idle`);
    s.add.existing(this);s.physics.add.existing(this);
    this.setOrigin(.5,1).setDepth(3);
    this.body.setSize(34,68).setOffset(13,28);
    this.body.setCollideWorldBounds(true);
    this.type=type;
    const cfg={grunt:{hp:55,spd:110,rng:78,dmg:10,kbx:170,kby:-35},
               heavy:{hp:130,spd:70,rng:92,dmg:20,kbx:290,kby:-100}};
    const c=cfg[type]||cfg.grunt;
    // Scale stats by stage index
    const si=s._stageIdx||0;
    const hpScale=1+si*0.22;const statScale=1+si*0.14;
    this.es=ES.IDLE;this.hp=Math.round(c.hp*hpScale);this.maxHp=this.hp;
    this.spd=Math.round(c.spd*(1+si*0.07));this.rng=c.rng;this.aDmg=Math.round(c.dmg*statScale);this.aKbX=c.kbx;this.aKbY=c.kby;
    this.iF=0;this.player=null;this._wF=0;this._wT=0;
    this._aCd=Phaser.Math.Between(1600,3000);this._lT=0;

    // Weapon assignment by stage: 0-1=none, 2-3=bottle(50%), 4-5=baton, 6+=chain
    const wRoll=Math.random();
    this._weapType=si>=6?'chain':si>=4?'baton':si>=2&&wRoll<0.55?'bottle':null;
    if(this._weapType){
      // Extra range and damage from weapon
      const wStats={bottle:{rngBonus:22,dmgBonus:9},baton:{rngBonus:38,dmgBonus:16},chain:{rngBonus:52,dmgBonus:22}};
      const ws=wStats[this._weapType];
      this.rng+=ws.rngBonus;this.aDmg+=ws.dmgBonus;
      // Weapon graphic (drawn once, repositioned in preUpdate)
      this._weapGfx=s.add.graphics().setDepth(4);
      this._drawWeapon();
    } else {this._weapGfx=null;}

    const bw=type==='heavy'?64:50;
    this._hbBg=s.add.rectangle(x,y-90,bw+4,8,0x1a0000).setDepth(9);
    this._hbFl=s.add.rectangle(x-bw/2,y-90,bw,6,type==='heavy'?C.orange:C.pink).setDepth(10).setOrigin(0,.5);
    this._bw=bw;
  }
  _drawWeapon(){
    const g=this._weapGfx;if(!g)return;g.clear();
    if(this._weapType==='bottle'){
      g.fillStyle(0x8B4513,1);g.fillRect(-4,-30,8,22);
      g.fillStyle(0x5d8a3c,1);g.fillRoundedRect(-3,-32,6,6,2);
    } else if(this._weapType==='baton'){
      g.fillStyle(0x222222,1);g.fillRect(-3,-42,6,36);
      g.fillStyle(0x888888,1);g.fillRect(-4,-44,8,6);
    } else if(this._weapType==='chain'){
      g.lineStyle(3,0xaaaaaa,1);
      for(let i=0;i<5;i++){g.strokeRect(-4+i*5,-38+i*6,8,6);}
    }
  }
  get onGnd(){return this.body.blocked.down;}

  preUpdate(t,dt){
    super.preUpdate(t,dt);
    // Hard floor clamp
    if(this.body&&this.body.bottom>FLOOR_Y){this.body.y=FLOOR_Y-this.body.height;this.body.velocity.y=0;}
    // Cap horizontal velocity so hitstop's 18× timeScale can't tunnel enemies off-screen
    if(this.body&&Math.abs(this.body.velocity.x)>520)
      this.body.velocity.x=Math.sign(this.body.velocity.x)*520;
    // Safety: if an enemy somehow escaped the world, kill them immediately
    if(this.x<-60||this.x>GW+60){this._die();return;}
    if(this.es===ES.DEAD)return;
    const by=this.y-(this.type==='heavy'?92:82);
    this._hbBg.setPosition(this.x,by);
    this._hbFl.setPosition(this.x-this._bw/2,by);
    this.iF=Math.max(0,this.iF-dt);
    // Reposition weapon in hand
    if(this._weapGfx){
      const sd=this.flipX?-1:1;
      const handX=this.x+sd*18;const handY=this.y-38;
      this._weapGfx.setPosition(handX,handY);
      this._weapGfx.setAlpha(this.es===ES.DEAD?0:1);
      if(this.es===ES.ATK)this._weapGfx.setAngle(this.flipX?-40:40);
      else this._weapGfx.setAngle(this.flipX?15:-15);
    }

    if(this.es===ES.GRAB){this._tex();return;}
    if(this.es===ES.THROWN){
      // land check
      if(this.onGnd){this.es=ES.LAUNCHED;this._lT=600;this.scene.ie.sparks(this.x,this.y,4);this.scene.ie.shake(5,200);this.setVelocityX(this.body.velocity.x*.2);}
      this._tex();return;
    }
    if(this.es===ES.LAUNCHED){this._lT-=dt;if(this._lT<=0&&this.onGnd)this.es=ES.IDLE;this._tex();return;}
    if(this.es===ES.ATK||this.es===ES.HURT){this._tex();return;}

    if(this.player&&this.player.ps!==PS.DEAD){
      const dx=this.player.x-this.x,dist=Math.abs(dx);
      if(dist>this.rng){this.setVelocityX(dx>0?this.spd:-this.spd);this.setFlipX(dx<0);this.es=ES.WALK;}
      else{this.setVelocityX(0);this.setFlipX(dx<0);this.es=ES.IDLE;
        this._aCd-=dt;if(this._aCd<=0){this._doAtk();this._aCd=Phaser.Math.Between(1200,2600);}
      }
    }
    this._wT+=dt;if(this.es===ES.WALK&&this._wT>150){this._wT=0;this._wF^=1;}
    this._tex();
  }

  _doAtk(){
    this.es=ES.ATK;this.setVelocityX(0);
    this.scene.time.delayedCall(180,()=>{
      if(this.es!==ES.ATK||!this.player)return;
      const d=Math.abs(this.player.x-this.x),dy=Math.abs(this.player.y-this.y);
      if(d<this.rng+22&&dy<55){this.player.hit(this.aDmg,this.aKbX,this.aKbY,this.x);this.scene.ie.blood(this.player.x,this.player.y-40,this.x<this.player.x?1:-1,12);}
    });
    this.scene.time.delayedCall(380,()=>{if(this.es===ES.ATK)this.es=ES.IDLE;});
  }

  _tex(){
    const p=this.type;
    const k=(()=>{
      if(this.es===ES.ATK)return `${p}_jab`;
      if(this.es===ES.HURT||this.es===ES.LAUNCHED||this.es===ES.THROWN||this.es===ES.GRAB)return `${p}_hurt`;
      if(this.es===ES.WALK)return this._wF?`${p}_walk2`:`${p}_walk1`;
      return `${p}_idle`;
    })();
    if(this.texture.key!==k)this.setTexture(k);
  }

  _applyDmg(amt,fromX){
    if(this.es===ES.DEAD)return;
    this.hp-=amt;const pct=Math.max(0,this.hp/this.maxHp);
    this._hbFl.width=this._bw*pct;this._hbFl.setFillStyle(pct<0.3?C.red:this.type==='heavy'?C.orange:C.pink);
    if(this.hp<=0)this._die();
  }

  takeDmg(amt,hd,fromX){
    if(this.iF>0||this.es===ES.DEAD)return false;
    this.hp-=amt;this.iF=180;
    this.setVelocityX(hd.kbX*(fromX<this.x?1:-1));if(hd.kbY)this.setVelocityY(hd.kbY);
    const pct=Math.max(0,this.hp/this.maxHp);
    this._hbFl.width=this._bw*pct;this._hbFl.setFillStyle(pct<0.3?C.red:this.type==='heavy'?C.orange:C.pink);
    // Hit sound: kick for heavy, punch for grunt
    if(this.type==='heavy')getSFX().kick();else getSFX().punch();
    if(this.hp<=0){this._die();return true;}
    if(hd.kbY<-180){this.es=ES.LAUNCHED;this._lT=900;}
    else{this.es=ES.HURT;this.scene.time.delayedCall(240,()=>{if(this.es===ES.HURT)this.es=ES.IDLE;});}
    return true;
  }

  _die(){
    if(this.es===ES.DEAD)return;this.es=ES.DEAD;
    this._hbBg.destroy();this._hbFl.destroy();
    if(this._weapGfx){try{this._weapGfx.destroy();}catch(e){}this._weapGfx=null;}
    // Girly wuss death sound
    getSFX().wussyDie();
    this.scene.ie.blood(this.x,this.y-35,this.flipX?-1:1,this.type==='heavy'?55:38);
    if(this.type==='heavy')this.scene.ie.explode(this.x,this.y-35);
    this.scene.time.delayedCall(500,()=>{this.scene.tweens.add({targets:this,alpha:0,duration:350,onComplete:()=>{this.scene.events.emit('enemyKilled',this);this.destroy();}});});
  }
}

// ════════════════════════════════════════════════════════════════
//  BOSS
// ════════════════════════════════════════════════════════════════
const BS={IDLE:0,WALK:1,ATK:2,SPRAY_CHARGE:3,SPRAY:4,HURT:5,DEAD:6};

class Boss extends Phaser.Physics.Arcade.Sprite{
  constructor(s,x,y){
    super(s,x,y,'boss_idle');
    s.add.existing(this);s.physics.add.existing(this);
    this.setOrigin(.5,1).setDepth(4);
    // 72×120 boss sprite → body offset so body bottom = y
    this.body.setSize(50,80).setOffset(11,40);
    this.body.setCollideWorldBounds(true);

    this.bs=BS.IDLE;this.hp=500;this.maxHp=500;
    this.iF=0;this.player=null;
    this._aCd=700;this._wF=0;this._wT=0;
    this._phase2=false;this._enraged=false;
    this._comboHits=0;this._lastHitTime=0;this._dodging=false;
    this._hitCount=0;    // hits received — first spray fires at 3
    this._sprayArmed=false; // true while a spray is scheduled/running
    this._schlong=null;  // graphic overlay shown during spray
    this.puddles=[];
  }
  get onGnd(){return this.body.blocked.down;}

  preUpdate(t,dt){
    super.preUpdate(t,dt);
    // Hard floor clamp
    if(this.body&&this.body.bottom>FLOOR_Y){this.body.y=FLOOR_Y-this.body.height;this.body.velocity.y=0;}
    if(this.bs===BS.DEAD)return;
    this.iF=Math.max(0,this.iF-dt);
    // Reposition schlong overlay if active
    if(this._schlong&&this._schlong.active){
      const sd=this.flipX?-1:1;
      this._schlong.setPosition(this.x+sd*38,this.y-52);
    }
    if(this.bs===BS.HURT||this.bs===BS.SPRAY_CHARGE||this.bs===BS.SPRAY){this._tex();return;}
    if(!this.player||this.player.ps===PS.DEAD)return;

    const dx=this.player.x-this.x,dist=Math.abs(dx);
    this.setFlipX(dx<0);

    // Spray is now fully timer-driven via delayedCall chain (_scheduleSpray)

    if(dist>110){this.setVelocityX(dx>0?90:-90);this.bs=BS.WALK;}
    else{
      this.setVelocityX(0);this.bs=BS.IDLE;
      this._aCd-=dt;if(this._aCd<=0){this._doAtk();this._aCd=Phaser.Math.Between(this._enraged?100:480,this._enraged?260:980);}
    }
    this._wT+=dt;if(this.bs===BS.WALK&&this._wT>180){this._wT=0;this._wF^=1;}
    this._tex();
  }

  _doAtk(){
    if(!this.player)return;
    const dist=Math.abs(this.player.x-this.x);
    // 30% chance of stomp when very close
    if(dist<90&&Math.random()<0.30){this._doStomp();return;}
    this.bs=BS.ATK;this.setVelocityX(0);
    const rush=dist>200;
    if(rush){this.setVelocityX((this.player.x>this.x?1:-1)*280);this.scene.time.delayedCall(350,()=>{this.setVelocityX(0);this.bs=BS.IDLE;});}
    this.scene.time.delayedCall(200,()=>{
      if(this.bs!==BS.ATK||!this.player)return;
      const d=Math.abs(this.player.x-this.x),dy=Math.abs(this.player.y-this.y);
      if(d<130&&dy<60){this.player.hit(28,320,-120,this.x);this.scene.ie.blood(this.player.x,this.player.y-50,this.x<this.player.x?1:-1,20);this.scene._combatPop('BOOF!',C.red,this.player.x,this.player.y-90,false);}
    });
    this.scene.time.delayedCall(rush?350:420,()=>{if(this.bs===BS.ATK)this.bs=BS.IDLE;});
  }

  _doStomp(){
    this.bs=BS.ATK;this.setVelocityX(0);
    this.scene._combatPop('STOMP!!',C.orange,this.x,this.y-130,false);
    // Small hop up
    this.setVelocityY(-260);
    this.scene.time.delayedCall(320,()=>{
      if(!this.active)return;
      // Land — shockwave ring + proximity damage
      this.setVelocityY(0);
      this.scene.ie.ring(this.x,FLOOR_Y,C.orange);
      this.scene.ie.shake(8,400);
      if(this.player&&this.player.active){
        const d=Math.abs(this.player.x-this.x);
        if(d<130){this.player.hit(30,0,-100,this.x);this.scene.ie.flash(this.player);this.scene._combatPop('GROUND POUND!',C.orange,GW/2,GH/2-80,false);}
        else if(d<220){this.player.hit(14,0,-50,this.x);this.scene._combatPop('SHOCKWAVE!',C.yellow,GW/2,GH/2-80,false);}
      }
      this.scene.time.delayedCall(350,()=>{if(this.bs===BS.ATK)this.bs=BS.IDLE;});
    });
  }

  // ── Schedule next spray after `ms` milliseconds ─────────────
  _scheduleSpray(ms){
    if(this._sprayArmed)return; // already one queued
    this._sprayArmed=true;
    this.scene.time.delayedCall(ms,()=>{
      this._sprayArmed=false;
      if(!this.active||this.bs===BS.DEAD)return;
      this._doSpray();
    });
  }

  _doSpray(){
    // Lock out another spray until this one completes
    this.bs=BS.SPRAY_CHARGE;
    this.setVelocityX(0);
    this.scene._combatPop('PISS CANNON INCOMING!!',C.bZ,GW/2,GH/2-80,false);

    // ── Build schlong graphic ─────────────────────────────────────
    if(this._schlong){this._schlong.destroy();this._schlong=null;}
    const sd=this.flipX?-1:1;
    const sg=this.scene.add.graphics().setDepth(5);
    this._schlong=sg;
    this._drawSchlong(sg,sd);
    sg.setAlpha(0);
    this.scene.tweens.add({targets:sg,alpha:1,duration:300});

    // 900ms charge → SPRAY
    this.scene.time.delayedCall(900,()=>{
      if(!this.active||this.bs===BS.DEAD){this._cleanSchlong();return;}
      this.bs=BS.SPRAY;
      this.scene._combatPop('FIRE!!',C.bZ,GW/2,GH/2-80,false);
      // Fire 14 drops from schlong tip — wider arc, heavier salvo
      const tipX=this.x+sd*92;
      const tipY=this.y-52;
      for(let i=0;i<14;i++){
        const ang=-42+i*6.5;          // spread: -42° to +43°
        const rad=Phaser.Math.DegToRad(ang);
        const speed=300+i*18;
        const vx=sd*speed*Math.cos(rad);
        const vy=-(180+Math.abs(ang)*2.2)*Math.abs(Math.cos(rad));
        this.scene._spawnPee(tipX,tipY,vx,vy);
      }
      // 700ms spray duration → return to idle + schedule next spray
      this.scene.time.delayedCall(700,()=>{
        if(!this.active)return;
        this._cleanSchlong();
        if(this.bs!==BS.DEAD)this.bs=BS.IDLE;
        // Queue next spray
        const gap=this._enraged?Phaser.Math.Between(400,800):Phaser.Math.Between(2200,3800);
        this._scheduleSpray(gap);
      });
    });
  }

  _drawSchlong(sg,sd){
    const s=sd>0?1:-1;
    sg.setPosition(this.x+s*38,this.y-52);
    sg.fillStyle(0x221100,1);sg.fillRect(-9,-15,18,9);      // hair
    sg.fillStyle(0xd4885a,1);sg.fillCircle(-s*5,9,9);sg.fillCircle(-s*13,10,8); // balls
    sg.fillStyle(0xf0a878,1);sg.fillRect(s>0?-5:-39,-7,44,14); // shaft
    sg.fillStyle(0xb8643c,1);sg.fillRect(s>0?-5:-39,6,44,3);   // underside shadow
    sg.fillStyle(0xdd7755,1);sg.fillCircle(s*43,0,13);          // glans
    sg.fillStyle(0xee9977,1);sg.fillCircle(s*40,-5,6);          // highlight
    sg.fillStyle(C.bZ,1);    sg.fillCircle(s*53,0,5);           // piss hole
  }

  _cleanSchlong(){
    if(this._schlong&&this._schlong.active){
      const sg=this._schlong;this._schlong=null;
      this.scene.tweens.add({targets:sg,alpha:0,duration:250,onComplete:()=>sg.destroy()});
    }
  }

  _tex(){
    const m={
      [BS.IDLE]:   this._wF?'boss_walk1':'boss_idle',
      [BS.WALK]:   this._wF?'boss_walk1':'boss_idle',
      [BS.ATK]:    'boss_atk',
      [BS.SPRAY_CHARGE]:'boss_charge',
      [BS.SPRAY]:  'boss_spray',
      [BS.HURT]:   'boss_hurt',
    };
    const k=m[this.bs]||'boss_idle';
    if(this.texture.key!==k)this.setTexture(k);
  }

  _doDodge(){
    if(this._dodging||this.bs===BS.SPRAY_CHARGE||this.bs===BS.SPRAY||this.bs===BS.DEAD)return;
    this._dodging=true;
    const dodgeDir=this.player?(this.player.x>this.x?-1:1):1;
    this.iF=700; // long invincibility during the dodge window
    this.bs=BS.IDLE;
    this.setTint(0x44ffff);
    this.scene._combatPop('DODGE!!',0x44ffff,this.x,this.y-140,false);
    this.setVelocityX(dodgeDir*460);
    this.scene.time.delayedCall(400,()=>{
      if(!this.active||this.bs===BS.DEAD)return;
      this.setVelocityX(0);
      this.clearTint();
      this._dodging=false;
      this._aCd=-1; // trigger immediate counter-attack punch
    });
  }

  takeDmg(amt,hd,fromX){
    if(this.iF>0||this.bs===BS.DEAD)return false;
    // Enrage armor — takes significantly less damage
    if(this._enraged) amt=Math.round(amt*0.45);
    // Combo tracker — if 3 hits land within 1400ms the boss dodges
    const now=Date.now();
    if(now-this._lastHitTime<1400){this._comboHits++;}else{this._comboHits=1;}
    this._lastHitTime=now;
    if(this._comboHits>=3&&!this._dodging){
      this._comboHits=0;
      this.hp-=amt; // still take the hit that triggered the dodge
      if(this.hp>0){
        this.scene.events.emit('bossHp',this.hp,this.maxHp);
        this._doDodge();
        return true;
      }
    }
    this.hp-=amt;this.iF=150;
    this._hitCount++;
    const pct=Math.max(0,this.hp/this.maxHp);
    this.scene.events.emit('bossHp',this.hp,this.maxHp);
    this.setVelocityX(hd.kbX*(fromX<this.x?0.3:-0.3)); // boss barely flinches
    if(this.hp<=0){this._die();return true;}
    // First spray: triggered by 3rd hit
    if(!this._phase2&&this._hitCount>=3){
      this._phase2=true;
      this.scene._combatPop('HE UNZIPS!!',C.bZ,GW/2,GH/2-60,false);
      this.scene.ie.shake(8,400);
      // Schedule first spray after a short pause — fully independent of preUpdate
      this._scheduleSpray(1400);
    }
    if(!this._enraged&&pct<=0.25){
      this._enraged=true;
      this.setTint(0xff3300); // fiery red tint signals armored rage
      this.scene._bigPop('ENRAGED!! + ARMORED!!',C.red);
    }
    // CRITICAL: never interrupt an active spray sequence with HURT state
    if(this.bs===BS.SPRAY_CHARGE||this.bs===BS.SPRAY)return true;
    this.bs=BS.HURT;
    this.scene.time.delayedCall(200,()=>{if(this.active&&this.bs===BS.HURT)this.bs=BS.IDLE;});
    return true;
  }

  _die(){
    if(this.bs===BS.DEAD)return;this.bs=BS.DEAD;
    this._cleanSchlong();
    // INSANE ROAR on boss defeat
    getSFX().bossRoar();
    this.scene.ie.explode(this.x,this.y-50);this.scene.ie.explode(this.x-30,this.y-80);this.scene.ie.explode(this.x+30,this.y-40);
    this.scene.ie.shake(15,1000);
    this.scene.time.delayedCall(800,()=>{
      this.scene.tweens.add({targets:this,alpha:0,duration:600,onComplete:()=>{this.scene.events.emit('bossKilled');this.destroy();}});
    });
  }
}

// ════════════════════════════════════════════════════════════════
//  BOSS 2 — THE GLITTER CANNON MANIAC
// ════════════════════════════════════════════════════════════════
const BS2={IDLE:0,WALK:1,ATK:2,SLAM_CHARGE:3,SLAM:4,GLITTER:5,DASH:6,HURT:7,DEAD:8};

class Boss2 extends Phaser.Physics.Arcade.Sprite{
  constructor(s,x,y){
    super(s,x,y,'boss2_idle');
    s.add.existing(this);s.physics.add.existing(this);
    this.setOrigin(.5,1).setDepth(4);
    this.body.setSize(50,80).setOffset(11,40);
    this.body.setCollideWorldBounds(true);
    this.bs=BS2.IDLE;this.hp=300;this.maxHp=300;
    this.iF=0;this.player=null;
    this._aCd=900;this._wF=0;this._wT=0;
    this._phase2=false;this._enraged=false;
    this._comboHits=0;this._lastHitTime=0;this._dodging=false;
    this._hitCount=0;this._specialArmed=false;this._specialIdx=0;
    this._schlong=null; // shown during glitter attack
  }
  get onGnd(){return this.body.blocked.down;}
  // Duck-type dead state so hit checks work
  get es(){return this.bs===BS2.DEAD?ES.DEAD:this.bs;}

  preUpdate(t,dt){
    super.preUpdate(t,dt);
    if(this.body&&this.body.bottom>FLOOR_Y){this.body.y=FLOOR_Y-this.body.height;this.body.velocity.y=0;}
    if(this.bs===BS2.DEAD)return;
    this.iF=Math.max(0,this.iF-dt);
    // Reposition glitter schlong
    if(this._schlong&&this._schlong.active){
      const sd2=this.flipX?-1:1;
      this._schlong.setPosition(this.x+sd2*38,this.y-52);
    }
    const busy=this.bs===BS2.HURT||this.bs===BS2.SLAM_CHARGE||this.bs===BS2.SLAM||this.bs===BS2.GLITTER||this.bs===BS2.DASH;
    if(busy){this._tex();return;}
    if(!this.player||this.player.ps===PS.DEAD)return;
    const dx=this.player.x-this.x,dist=Math.abs(dx);
    this.setFlipX(dx<0);
    if(dist>110){this.setVelocityX(dx>0?100:-100);this.bs=BS2.WALK;}
    else{
      this.setVelocityX(0);this.bs=BS2.IDLE;
      this._aCd-=dt;
      if(this._aCd<=0){this._doAtk();this._aCd=Phaser.Math.Between(this._enraged?160:700,this._enraged?380:1400);}
    }
    this._wT+=dt;if(this.bs===BS2.WALK&&this._wT>180){this._wT=0;this._wF^=1;}
    this._tex();
  }

  _doAtk(){
    this.bs=BS2.ATK;this.setVelocityX(0);
    // lunge toward player
    const ldir=this.player&&this.player.x>this.x?1:-1;
    this.setVelocityX(ldir*180);
    this.scene.time.delayedCall(130,()=>{
      this.setVelocityX(0);
      if(this.bs!==BS2.ATK||!this.player)return;
      const d=Math.abs(this.player.x-this.x),dy=Math.abs(this.player.y-this.y);
      if(d<155&&dy<75){
        this.player.hit(35,320,-130,this.x);
        this.scene.ie.blood(this.player.x,this.player.y-50,this.x<this.player.x?1:-1,22);
        this.scene._combatPop('CHROME SMASH!',C.b2Z,this.player.x,this.player.y-90,false);
      }
    });
    this.scene.time.delayedCall(280,()=>{if(this.bs===BS2.ATK)this.bs=BS2.IDLE;});
  }

  _scheduleSpecial(ms){
    if(this._specialArmed)return;
    this._specialArmed=true;
    this.scene.time.delayedCall(ms,()=>{
      this._specialArmed=false;
      if(!this.active||this.bs===BS2.DEAD)return;
      this._doSpecial();
    });
  }

  _doSpecial(){
    const sp=[()=>this._doSlam(),()=>this._doGlitter(),()=>this._doDash()];
    sp[this._specialIdx%3]();
    this._specialIdx++;
  }

  _doSlam(){
    this.bs=BS2.SLAM_CHARGE;this.setVelocityX(0);
    this.scene._combatPop('GROUND POUND!!',C.b2Z,GW/2,GH/2-80,false);
    this.setVelocityY(-720);
    this.scene.time.delayedCall(480,()=>{
      if(!this.active||this.bs===BS2.DEAD)return;
      this.bs=BS2.SLAM;this.setVelocityY(950);
      this.scene.time.delayedCall(330,()=>{
        if(!this.active)return;
        this.setVelocityY(0);
        if(this.body){this.body.y=FLOOR_Y-this.body.height;}
        this.scene.ie.shake(10,500);
        // 4 expanding shockwave rings
        for(let i=0;i<4;i++){
          const delay=i*110;
          this.scene.time.delayedCall(delay,()=>{
            if(!this.scene)return;
            const r=this.scene.add.image(this.x,FLOOR_Y-10,'ring').setScale(.2).setDepth(8).setTint(C.b2Z);
            this.scene.tweens.add({targets:r,scaleX:9,scaleY:4,alpha:0,duration:700,ease:'Quad.Out',onComplete:()=>r.destroy()});
            // Damage player if caught in ring wave
            this.scene.time.delayedCall(200,()=>{
              if(!this.scene?.player?.active)return;
              const dist=Math.abs(this.scene.player.x-this.x);
              const waveMin=60+i*120,waveMax=waveMin+160;
              if(dist>=waveMin&&dist<=waveMax){
                this.scene.player.hit(28,190,0,this.x);
                this.scene._combatPop('SHOCKWAVE!',C.b2Z,this.scene.player.x,this.scene.player.y-80,true);
              }
            });
          });
        }
        this.scene.time.delayedCall(750,()=>{
          if(this.active&&this.bs!==BS2.DEAD)this.bs=BS2.IDLE;
          const gap=this._enraged?Phaser.Math.Between(400,850):Phaser.Math.Between(2200,3500);
          this._scheduleSpecial(gap);
        });
      });
    });
  }

  _doGlitter(){
    this.bs=BS2.GLITTER;this.setVelocityX(0);
    this.scene._combatPop('GLITTER CANNON!!',C.pink,GW/2,GH/2-80,false);
    const sd=this.flipX?-1:1;

    // ── Schlong appears (same style as Boss1 but chrome-green tinted) ─
    if(this._schlong){this._schlong.destroy();this._schlong=null;}
    const sg=this.scene.add.graphics().setDepth(5);
    this._schlong=sg;
    // Draw boss2 schlong (chrome/neon-green colours)
    const s2=sd>0?1:-1;
    sg.setPosition(this.x+s2*38,this.y-52);
    sg.fillStyle(0x222233,1);sg.fillRect(-9,-15,18,9);           // hair
    sg.fillStyle(0xaaaacc,1);sg.fillCircle(-s2*5,9,9);sg.fillCircle(-s2*13,10,8); // balls (chrome)
    sg.fillStyle(0xccccdd,1);sg.fillRect(s2>0?-5:-39,-7,44,14); // shaft (silver)
    sg.fillStyle(0x8888aa,1);sg.fillRect(s2>0?-5:-39,6,44,3);   // underside
    sg.fillStyle(0x8899bb,1);sg.fillCircle(s2*43,0,13);           // glans
    sg.fillStyle(0xaabbdd,1);sg.fillCircle(s2*40,-5,6);           // highlight
    sg.fillStyle(C.b2Z,1);   sg.fillCircle(s2*53,0,6);            // neon-green tip
    sg.setAlpha(0);
    this.scene.tweens.add({targets:sg,alpha:1,duration:250});

    // ── 600ms charge then fire from tip ──────────────────────────────
    this.scene.time.delayedCall(600,()=>{
      if(!this.active||this.bs===BS2.DEAD){this._cleanSchlong();return;}
      const tipX=this.x+sd*92;
      const tipY=this.y-52;
      // Neon spark at tip
      this.scene.ie.sparks(tipX,tipY,4);
      for(let i=0;i<12;i++){
        const ang=-38+i*7;
        const rad=Phaser.Math.DegToRad(ang);
        const speed=280+i*20;
        const vx=sd*speed*Math.cos(rad);
        const vy=-(170+Math.abs(ang)*2)*Math.abs(Math.cos(rad));
        this.scene.time.delayedCall(i*60,()=>{
          if(!this.scene||!this.active)return;
          this.scene._spawnGlitter(tipX,tipY,vx,vy);
        });
      }
      this.scene.time.delayedCall(750,()=>{
        this._cleanSchlong();
        if(this.active&&this.bs!==BS2.DEAD)this.bs=BS2.IDLE;
        const gap=this._enraged?Phaser.Math.Between(400,850):Phaser.Math.Between(2200,3500);
        this._scheduleSpecial(gap);
      });
    });
  }

  _cleanSchlong(){
    if(this._schlong&&this._schlong.active){
      const sg=this._schlong;this._schlong=null;
      this.scene.tweens.add({targets:sg,alpha:0,duration:250,onComplete:()=>sg.destroy()});
    }
  }

  _doDash(){
    this.bs=BS2.DASH;this.setVelocityX(0);
    this.scene._combatPop('CHROME RUSH!!',C.b2Z,GW/2,GH/2-80,false);
    this.setTint(C.b2Z);
    const doDash=(n)=>{
      if(n<=0||!this.active||this.bs===BS2.DEAD){
        if(this.active){this.clearTint();if(this.bs!==BS2.DEAD)this.bs=BS2.IDLE;}
        const gap=this._enraged?Phaser.Math.Between(400,850):Phaser.Math.Between(2200,3500);
        this._scheduleSpecial(gap);
        return;
      }
      const dashDir=this.scene.player&&this.scene.player.x>this.x?1:-1;
      this.setVelocityX(dashDir*540);
      this.scene.ie.sparks(this.x,this.y-40,3);
      this.scene.time.delayedCall(290,()=>{
        if(!this.active)return;
        if(this.scene.player?.active){
          const d=Math.abs(this.scene.player.x-this.x);
          const dy=Math.abs(this.scene.player.y-this.y);
          if(d<95&&dy<85){
            this.scene.player.hit(32,400,-100,this.x);
            this.scene._pop('RUSH HIT!',C.b2Z,this.x,this.y-80,false);
          }
        }
        this.setVelocityX(0);
        this.scene.time.delayedCall(220,()=>doDash(n-1));
      });
    };
    doDash(2);
  }

  _tex(){
    const m={
      [BS2.IDLE]:       this._wF?'boss2_walk1':'boss2_idle',
      [BS2.WALK]:       this._wF?'boss2_walk1':'boss2_idle',
      [BS2.ATK]:        'boss2_atk',
      [BS2.SLAM_CHARGE]:'boss2_charge',
      [BS2.SLAM]:       'boss2_atk',
      [BS2.GLITTER]:    'boss2_spray',
      [BS2.DASH]:       'boss2_atk',
      [BS2.HURT]:       'boss2_hurt',
    };
    const k=m[this.bs]||'boss2_idle';
    if(this.texture.key!==k)this.setTexture(k);
  }

  _doDodge(){
    if(this._dodging||this.bs===BS2.SLAM_CHARGE||this.bs===BS2.SLAM||this.bs===BS2.GLITTER||this.bs===BS2.DASH||this.bs===BS2.DEAD)return;
    this._dodging=true;
    const dodgeDir=this.player?(this.player.x>this.x?-1:1):1;
    this.iF=650;
    this.bs=BS2.IDLE;
    this.setTint(0xaa44ff);
    this.scene._combatPop('DODGE!!',0xcc66ff,this.x,this.y-140,false);
    this.scene.ie.sparks(this.x,this.y-40,4);
    this.setVelocityX(dodgeDir*500);
    this.scene.time.delayedCall(360,()=>{
      if(!this.active||this.bs===BS2.DEAD)return;
      this.setVelocityX(0);
      this.clearTint();
      if(this._enraged)this.setTint(0xcc00ff); // restore enrage tint
      this._dodging=false;
      this._aCd=-1; // immediate counter after dodge
    });
  }

  takeDmg(amt,hd,fromX){
    if(this.iF>0||this.bs===BS2.DEAD)return false;
    // Enrage armor — takes significantly less damage
    if(this._enraged) amt=Math.round(amt*0.45);
    // Combo tracker — 3 rapid hits triggers a dodge
    const now=Date.now();
    if(now-this._lastHitTime<1400){this._comboHits++;}else{this._comboHits=1;}
    this._lastHitTime=now;
    if(this._comboHits>=3&&!this._dodging){
      this._comboHits=0;
      this.hp-=amt;
      if(this.hp>0){
        this.scene.events.emit('bossHp',this.hp,this.maxHp);
        this._doDodge();
        return true;
      }
    }
    this.hp-=amt;this.iF=130;
    this._hitCount++;
    this.scene.events.emit('bossHp',this.hp,this.maxHp);
    this.setVelocityX(hd.kbX*(fromX<this.x?0.3:-0.3));
    if(this.hp<=0){this._die();return true;}
    if(!this._phase2&&this._hitCount>=2){
      this._phase2=true;
      this.scene._combatPop('HE UNZIPS THE GLITTER!!',C.b2Z,GW/2,GH/2-60,false);
      this.scene.ie.shake(8,400);
      this._scheduleSpecial(1200);
    }
    if(!this._enraged&&this.hp/this.maxHp<=0.3){
      this._enraged=true;
      this.setTint(0xcc00ff); // neon purple armor glow
      this.scene._bigPop('GLITTER OVERLOAD!! + ARMORED!!',C.b2Z);
    }
    const busy=this.bs===BS2.SLAM_CHARGE||this.bs===BS2.SLAM||this.bs===BS2.GLITTER||this.bs===BS2.DASH;
    if(busy)return true;
    this.bs=BS2.HURT;
    this.scene.time.delayedCall(180,()=>{if(this.active&&this.bs===BS2.HURT)this.bs=BS2.IDLE;});
    return true;
  }

  _die(){
    if(this.bs===BS2.DEAD)return;this.bs=BS2.DEAD;
    this._cleanSchlong();
    // INSANE ROAR — Boss 2 gets an even bigger one
    getSFX().bossRoar();getSFX().bossRoar();// double-roar for extra drama
    this.scene.ie.explode(this.x,this.y-50);this.scene.ie.explode(this.x-30,this.y-80);
    this.scene.ie.explode(this.x+30,this.y-40);this.scene.ie.explode(this.x,this.y-20);
    this.scene.ie.shake(15,1000);
    // Chrome shatter burst
    for(let i=0;i<20;i++){
      const ang=Phaser.Math.DegToRad(i*18);
      const sp=this.scene.add.image(this.x,this.y-50,'spark').setTint(C.b2Z).setScale(3).setDepth(15);
      const dist=Phaser.Math.Between(60,180);
      this.scene.tweens.add({targets:sp,x:this.x+Math.cos(ang)*dist,y:(this.y-50)+Math.sin(ang)*dist,
        scaleX:0,scaleY:0,alpha:0,duration:Phaser.Math.Between(500,900),ease:'Quad.Out',
        onComplete:()=>sp.destroy()});
    }
    this.scene.time.delayedCall(800,()=>{
      this.scene.tweens.add({targets:this,alpha:0,duration:600,
        onComplete:()=>{this.scene.events.emit('bossKilled');this.destroy();}});
    });
  }
}

// ════════════════════════════════════════════════════════════════
//  YELLOW PEE DROP (manual position update — no Phaser physics)
// ════════════════════════════════════════════════════════════════
class PeeDrop{
  constructor(s,x,y,vx,vy){
    this.scene=s;
    this.x=x;this.y=y;
    this.vx=vx;this.vy=vy;
    this._done=false;
    this.img=s.add.image(x,y,'pdrop').setDepth(6).setTint(C.bZ).setScale(2.2);
  }
  update(dt){
    if(this._done)return;
    const dtS=Math.min(dt,50)/1000;
    this.vy+=1200*dtS;          // manual gravity
    this.x+=this.vx*dtS;
    this.y+=this.vy*dtS;
    this.img.setPosition(this.x,this.y);
    // Trail dot
    if(Phaser.Math.Between(0,2)===0){
      const tr=this.scene.add.image(this.x,this.y,'pdrop').setScale(.5).setTint(C.bZ).setAlpha(.6).setDepth(5);
      this.scene.tweens.add({targets:tr,alpha:0,scaleX:.1,scaleY:.1,duration:300,onComplete:()=>tr.destroy()});
    }
    // Land check
    if(this.y>=FLOOR_Y){
      this._done=true;
      this.img.destroy();
      this.scene._spawnPuddle(this.x,FLOOR_Y-5);
    }
  }
}

// ════════════════════════════════════════════════════════════════
//  GLITTER DROP (boss2 projectile — bouncy, colorful)
// ════════════════════════════════════════════════════════════════
class GlitterDrop{
  constructor(s,x,y,vx,vy){
    this.scene=s; this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this._done=false; this._bounces=0;
    const cols=[C.pink,C.cyan,C.yellow,C.green,C.purple,C.orange];
    this._col=cols[Phaser.Math.Between(0,cols.length-1)];
    this.img=s.add.image(x,y,'pdrop').setDepth(6).setTint(this._col).setScale(2.0);
  }
  update(dt){
    if(this._done)return;
    const dtS=Math.min(dt,50)/1000;
    this.vy+=1200*dtS;
    this.x+=this.vx*dtS; this.y+=this.vy*dtS;
    this.img.setPosition(this.x,this.y);
    if(Phaser.Math.Between(0,2)===0){
      const tr=this.scene.add.image(this.x,this.y,'pdrop').setScale(.4).setTint(this._col).setAlpha(.7).setDepth(5);
      this.scene.tweens.add({targets:tr,alpha:0,scaleX:.1,scaleY:.1,duration:250,onComplete:()=>tr.destroy()});
    }
    if(this.y>=FLOOR_Y){
      if(this._bounces<1){
        this._bounces++;
        this.y=FLOOR_Y;
        this.vy=-Math.abs(this.vy)*0.45; // lower bounce
        this.vx*=0.25;                    // kill most horizontal so it lands nearby
        this.scene.ie.sparks(this.x,FLOOR_Y,2);
      } else {
        this._done=true; this.img.destroy();
        this.scene._spawnGlitterSplash(this.x,FLOOR_Y);
      }
    }
  }
}

// ════════════════════════════════════════════════════════════════
//  YELLOW PUDDLE (floor hazard)
// ════════════════════════════════════════════════════════════════
class Puddle{
  constructor(s,x,y){
    this.scene=s;this.x=x;this.y=y;this.r=80;this.active=true;
    this.img=s.add.image(x,y,'puddle').setDepth(2).setTint(C.bZ).setScale(1).setAlpha(.85);
    // Ripple
    s.tweens.add({targets:this.img,scaleX:1.15,scaleY:1.15,duration:600,yoyo:true,repeat:-1});
    // Steam particles periodically
    this._steamT=s.time.addEvent({delay:400,loop:true,callback:()=>this._steam()});
    // Auto-fade after 5s
    s.time.delayedCall(5000,()=>this._destroy());
  }
  _steam(){
    if(!this.active)return;
    const sm=this.scene.add.text(this.x+Phaser.Math.Between(-20,20),this.y-5,'~',{fontFamily:'Arial',fontSize:'14px',color:'#cccc00',alpha:.8}).setDepth(6);
    this.scene.tweens.add({targets:sm,y:sm.y-30,alpha:0,duration:800,onComplete:()=>sm.destroy()});
  }
  _destroy(){
    this.active=false;this._steamT.remove();
    this.scene.tweens.add({targets:this.img,alpha:0,duration:800,onComplete:()=>this.img.destroy()});
    this.scene.puddles=this.scene.puddles.filter(p=>p!==this);
  }
  check(player){
    if(!this.active)return;
    const d=Math.abs(player.x-this.x);
    if(d<this.r&&Math.abs(player.y-this.y)<30){player.hit(10,0,0,player.x);this.scene.ie.flash(player);this.scene._pop('EWWW!',C.bZ,player.x,player.y-60,true);}
  }
}

let _GAC=null;

  if(!_GAC){

// ════════════════════════════════════════════════════════════════
//  SFX ENGINE  (punch/kick/wuss-die/boss-roar — one-shots)
// ════════════════════════════════════════════════════════════════
class SFX{
  constructor(){this._vol=2.8;this._dieVar=0;}
  _ctx(){return getGameAC();}
  _g(vol,t){
    const c=this._ctx();if(!c)return null;
    const g=c.createGain();g.gain.setValueAtTime(vol,t+0.001);g.connect(c.destination);return g;
  }
  _noise(dur,freq,vol,t,q=1.4){
    const c=this._ctx();if(!c)return;
    const sr=c.sampleRate,n=Math.ceil(sr*dur);
    const buf=c.createBuffer(1,n,sr),d=buf.getChannelData(0);
    for(let i=0;i<n;i++)d[i]=Math.random()*2-1;
    const src=c.createBufferSource();src.buffer=buf;
    const f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=freq;f.Q.value=q;
    const g=this._g(vol,t);if(!g)return;
    src.connect(f);f.connect(g);
    g.gain.setValueAtTime(vol,t+0.001);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    src.start(t);src.stop(t+dur+0.01);
  }
  punch(){
    const c=this._ctx();if(!c)return;
    const t=c.currentTime+0.004;
    this._noise(0.055,1800,this._vol*1.3,t,1.6);// sharp crack
    this._noise(0.08,700,this._vol*0.9,t,0.9); // body thud
    const o=c.createOscillator(),g=this._g(this._vol*0.8,t);if(!g)return;
    o.type='sine';o.frequency.setValueAtTime(340,t);o.frequency.exponentialRampToValueAtTime(80,t+0.045);
    o.connect(g);o.start(t);o.stop(t+0.065);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.065);
  }
  kick(){
    const c=this._ctx();if(!c)return;
    const t=c.currentTime+0.004;
    const o=c.createOscillator(),g=this._g(this._vol*1.6,t);if(!g)return;
    o.type='sine';o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(38,t+0.09);
    o.connect(g);o.start(t);o.stop(t+0.16);
    g.gain.setValueAtTime(this._vol*1.6,t+0.001);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.16);
    this._noise(0.03,4000,this._vol*0.9,t,2.0);// click crack
    this._noise(0.09,400,this._vol*0.8,t,0.7); // bass body
  }
  // 5 random girly wuss death sounds
  wussyDie(){
    const v=this._dieVar%5;this._dieVar++;
    const c=this._ctx();if(!c)return;
    const t=c.currentTime+0.004;
    const V=this._vol;
    if(v===0){
      // "EEEEEK!" — fast rising shriek
      const o=c.createOscillator(),g=this._g(0.001,t);if(!g)return;
      o.type='sine';o.frequency.setValueAtTime(480,t);o.frequency.linearRampToValueAtTime(1600,t+0.15);o.frequency.linearRampToValueAtTime(1000,t+0.3);
      o.connect(g);o.start(t);o.stop(t+0.35);
      g.gain.linearRampToValueAtTime(V*1.0,t+0.03);g.gain.setValueAtTime(V*1.0,t+0.18);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      const o2=c.createOscillator(),g2=this._g(0.001,t);if(!g2)return;
      o2.type='sine';o2.frequency.setValueAtTime(1100,t);o2.frequency.linearRampToValueAtTime(3200,t+0.1);
      o2.connect(g2);o2.start(t);o2.stop(t+0.18);g2.gain.linearRampToValueAtTime(V*0.4,t+0.02);g2.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    } else if(v===1){
      // "NOOOO!" — descending wail
      const o=c.createOscillator(),g=this._g(0.001,t);if(!g)return;
      o.type='sine';o.frequency.setValueAtTime(900,t);o.frequency.linearRampToValueAtTime(320,t+0.4);
      o.connect(g);o.start(t);o.stop(t+0.45);
      g.gain.linearRampToValueAtTime(V*1.1,t+0.04);g.gain.setValueAtTime(V*1.1,t+0.1);g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
    } else if(v===2){
      // "UGGHHH" — grunting tumble
      [280,420,560].forEach((f,i)=>{
        const o=c.createOscillator(),g=this._g(0.001,t+i*0.05);if(!g)return;
        o.type='sawtooth';o.frequency.setValueAtTime(f,t+i*0.05);o.frequency.linearRampToValueAtTime(f*0.6,t+i*0.05+0.12);
        const lp=c.createBiquadFilter();lp.type='lowpass';lp.frequency.value=1800;
        o.connect(lp);lp.connect(g);o.start(t+i*0.05);o.stop(t+i*0.05+0.15);
        g.gain.linearRampToValueAtTime(V*0.7,t+i*0.05+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.05+0.15);
      });
    } else if(v===3){
      // "WAHHHH" — crying slide
      const o=c.createOscillator(),g=this._g(0.001,t);if(!g)return;
      o.type='sine';
      o.frequency.setValueAtTime(700,t);o.frequency.linearRampToValueAtTime(1200,t+0.08);
      o.frequency.linearRampToValueAtTime(550,t+0.22);o.frequency.linearRampToValueAtTime(800,t+0.32);
      o.frequency.linearRampToValueAtTime(300,t+0.5);
      o.connect(g);o.start(t);o.stop(t+0.55);
      g.gain.linearRampToValueAtTime(V*1.2,t+0.03);g.gain.setValueAtTime(V*1.2,t+0.12);g.gain.exponentialRampToValueAtTime(0.001,t+0.55);
    } else {
      // "GYAAAH!" — surprise shriek burst
      const o=c.createOscillator(),g=this._g(0.001,t);if(!g)return;
      o.type='square';o.frequency.setValueAtTime(600,t);o.frequency.linearRampToValueAtTime(2200,t+0.06);o.frequency.linearRampToValueAtTime(400,t+0.22);
      const lp=c.createBiquadFilter();lp.type='lowpass';lp.frequency.value=2400;
      o.connect(lp);lp.connect(g);o.start(t);o.stop(t+0.28);
      g.gain.linearRampToValueAtTime(V*1.0,t+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
      this._noise(0.05,2800,V*0.6,t,2.0);
    }
  }
  bossRoar(){
    const c=this._ctx();if(!c)return;
    const t=c.currentTime+0.004;
    [40,60,80,53].forEach((f,i)=>{
      const o=c.createOscillator(),g=this._g(0.001,t);if(!g)return;
      const lp=c.createBiquadFilter();lp.type='lowpass';lp.frequency.value=700;lp.Q.value=2;
      o.type=i%2===0?'sawtooth':'square';o.frequency.setValueAtTime(f,t);
      o.frequency.linearRampToValueAtTime(f*0.35,t+1.4);
      o.connect(lp);lp.connect(g);o.start(t);o.stop(t+1.6);
      const v=this._vol*(i===0?1.8:0.8);
      g.gain.linearRampToValueAtTime(v,t+0.05);g.gain.setValueAtTime(v,t+0.6);g.gain.exponentialRampToValueAtTime(0.001,t+1.6);
    });
    const o3=c.createOscillator(),g3=this._g(0.001,t);if(!g3)return;
    const dist=c.createWaveShaper();
    const curve=new Float32Array(256);for(let i=0;i<256;i++)curve[i]=Math.tanh((i/128-1)*4);
    dist.curve=curve;
    o3.type='sawtooth';o3.frequency.setValueAtTime(130,t);o3.frequency.linearRampToValueAtTime(28,t+1.1);
    o3.connect(dist);dist.connect(g3);o3.start(t);o3.stop(t+1.3);
    g3.gain.linearRampToValueAtTime(this._vol*0.7,t+0.08);g3.gain.exponentialRampToValueAtTime(0.001,t+1.3);
    this._noise(0.15,500,this._vol*1.2,t,0.9);
  }
}
// Global SFX instance
let _sfx=null;
function getSFX(){if(!_sfx)_sfx=new SFX();return _sfx;}

// ════════════════════════════════════════════════════════════════
//  MUSIC ENGINE  (procedural — groove/boss1/sexy modes)
// ════════════════════════════════════════════════════════════════
class MusicEngine{
  constructor(){
    this._mode=null;this._timer=null;
    this._beat=0;this._bpm=96;this._running=false;
    this._master=null;this._comp=null;
  }
  _ctx(){return getGameAC();}
  _ensureMaster(){
    const c=this._ctx();if(!c)return false;
    if(!this._master){
      this._comp=c.createDynamicsCompressor();
      this._comp.threshold.value=-12;this._comp.knee.value=6;
      this._comp.ratio.value=4;this._comp.attack.value=0.003;this._comp.release.value=0.18;
      this._master=c.createGain();this._master.gain.value=0.72;
      this._master.connect(this._comp);this._comp.connect(c.destination);
    }
    return true;
  }
  play(mode){
    if(!this._ensureMaster())return;
    if(this._mode===mode&&this._running)return;
    this.stop();
    this._mode=mode;this._beat=0;this._running=true;
    if(mode==='groove'){this._bpm=96;this._tick();}
    else if(mode==='boss1'){this._bpm=148;this._tick();}
    else if(mode==='sexy'){this._bpm=128;this._tick();}
  }
  stop(){
    this._running=false;this._mode=null;
    if(this._timer){clearTimeout(this._timer);this._timer=null;}
  }
  _tick(){
    if(!this._running)return;
    if(this._mode==='groove')this._groove();
    else if(this._mode==='boss1')this._boss1();
    else if(this._mode==='sexy')this._sexy();
    const bt=(60/this._bpm)*1000;
    this._beat++;
    this._timer=setTimeout(()=>this._tick(),bt-20);
  }

  // ── helpers ──────────────────────────────────────────────────
  _now(){const c=this._ctx();return c?c.currentTime+0.04:0;}
  _g(vol,t){
    const c=this._ctx();if(!c||!this._master)return null;
    const g=c.createGain();g.gain.setValueAtTime(vol,t);g.connect(this._master);return g;
  }
  _kick(t,vol=0.9){
    const c=this._ctx();if(!c)return;
    const o=c.createOscillator(),g=this._g(vol,t);if(!g)return;
    o.type='sine';o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(38,t+0.10);
    o.connect(g);o.start(t);o.stop(t+0.16);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.16);
    // click
    const buf=c.createBuffer(1,Math.ceil(c.sampleRate*0.012),c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    const src=c.createBufferSource();src.buffer=buf;
    const filt=c.createBiquadFilter();filt.type='highpass';filt.frequency.value=1800;
    const cg=this._g(vol*0.5,t);if(!cg)return;
    src.connect(filt);filt.connect(cg);cg.gain.exponentialRampToValueAtTime(0.001,t+0.012);
    src.start(t);
  }
  _snare(t,vol=0.55){
    const c=this._ctx();if(!c)return;
    // Tone body
    const o=c.createOscillator(),g=this._g(vol*0.6,t);if(!g)return;
    o.type='triangle';o.frequency.setValueAtTime(240,t);o.connect(g);o.start(t);o.stop(t+0.08);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
    // Noise snare
    const buf=c.createBuffer(1,Math.ceil(c.sampleRate*0.16),c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    const src=c.createBufferSource();src.buffer=buf;
    const f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=2400;f.Q.value=0.9;
    const ng=this._g(vol,t);if(!ng)return;
    src.connect(f);f.connect(ng);ng.gain.exponentialRampToValueAtTime(0.001,t+0.16);
    src.start(t);
  }
  _hat(t,vol=0.18,open=false){
    const c=this._ctx();if(!c)return;
    const dur=open?0.18:0.038;
    const buf=c.createBuffer(1,Math.ceil(c.sampleRate*dur),c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    const src=c.createBufferSource();src.buffer=buf;
    const f=c.createBiquadFilter();f.type='highpass';f.frequency.value=7500;
    const g=this._g(vol,t);if(!g)return;
    src.connect(f);f.connect(g);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    src.start(t);
  }
  _bass(t,freq,dur,vol=0.55){
    const c=this._ctx();if(!c)return;
    const o=c.createOscillator();
    const lp=c.createBiquadFilter();lp.type='lowpass';lp.frequency.setValueAtTime(700,t);lp.Q.value=3.5;
    const g=this._g(vol,t);if(!g)return;
    o.type='sawtooth';o.frequency.setValueAtTime(freq,t);
    // plucky click
    lp.frequency.setValueAtTime(2200,t);lp.frequency.exponentialRampToValueAtTime(380,t+0.06);
    o.connect(lp);lp.connect(g);o.start(t);o.stop(t+dur);
    g.gain.setValueAtTime(vol,t);g.gain.setValueAtTime(vol,t+dur*0.75);g.gain.linearRampToValueAtTime(0,t+dur);
  }
  _chord(t,freqs,dur,vol=0.22){
    const c=this._ctx();if(!c)return;
    freqs.forEach(freq=>{
      const o=c.createOscillator(),g=this._g(vol/freqs.length,t);if(!g)return;
      const f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=3200;
      o.type='square';o.frequency.setValueAtTime(freq,t);
      o.connect(f);f.connect(g);o.start(t);o.stop(t+dur);
      g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    });
  }
  _lead(t,freq,dur,vol=0.18){
    const c=this._ctx();if(!c)return;
    const o=c.createOscillator(),g=this._g(vol,t);if(!g)return;
    const f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=freq*1.5;f.Q.value=3;
    o.type='square';o.frequency.setValueAtTime(freq,t);
    o.connect(f);f.connect(g);o.start(t);o.stop(t+dur);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  }
  _pad(t,freq,dur,vol=0.12){
    const c=this._ctx();if(!c)return;
    const o=c.createOscillator(),g=this._g(0.001,t);if(!g)return;
    const f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=1400;
    o.type='sawtooth';o.frequency.setValueAtTime(freq,t);
    o.connect(f);f.connect(g);o.start(t);o.stop(t+dur+0.05);
    g.gain.linearRampToValueAtTime(vol,t+0.08);g.gain.setValueAtTime(vol,t+dur-0.1);g.gain.linearRampToValueAtTime(0,t+dur);
  }

  // ── GROOVE mode: 96 BPM funky city streets ───────────────────
  _groove(){
    const bt=60/96,t=this._now(),b=this._beat,s=b%16;
    // Kick: 1 and 3 with syncopated ghost on 3.5
    if(s===0||s===8)this._kick(t,1.0);
    if(s===10)this._kick(t,0.45); // ghost
    // Snare: 2 and 4
    if(s===4||s===12)this._snare(t,0.65);
    // 16th hats, open on 2.5 and 4.5
    this._hat(t,(s===6||s===14)?0.22:0.14,s===6||s===14);
    // Funky bass line — D minor pentatonic
    const BL=[146,0,146,0,110,0,130,110,0,87,0,110,130,0,87,0];
    if(BL[s])this._bass(t,BL[s],bt*0.65,0.6);
    // Wah chord chops on offbeats (Dm7: D/F/A/C)
    const WAH=[[146,184,220],[146,184,220],[110,138,165],[123,155,185]];
    if(s===3||s===7||s===11||s===15){
      this._chord(t,WAH[Math.floor(b/4)%4],0.05,0.18);
    }
    // Horn stab every 2 bars (beat 1)
    if(s===0&&b%32===0){
      [440,554,659].forEach((f,i)=>this._lead(t+i*0.012,f,0.18,0.22));
    }
    // Big horn punch every 4 bars (bar 3 beat 3)
    if(s===8&&b%64===32)this._chord(t,[220,277,329],0.14,0.3);
    // Pad wash every 2 bars
    if(s===0&&b%32===16){
      [146,184,220,261].forEach((f,i)=>this._pad(t+i*0.025,f,bt*8,0.1));
    }
  }

  // ── BOSS1 mode: 148 BPM driving metal ────────────────────────
  _boss1(){
    const bt=60/148,t=this._now(),b=this._beat,s=b%16;
    // Double kick pattern: hits 0,2,4,6,8,10,12,14 + extra ghost
    if(s%4===0)this._kick(t,1.1);
    if(s%4===2)this._kick(t,0.75);
    if(s===3||s===11)this._kick(t,0.5); // 16th note ghost
    // Snare on 2 and 4, with rimshot crack
    if(s===4||s===12){this._snare(t,0.8);this._snare(t+0.006,0.45);}
    // Tight 16th hats throughout
    this._hat(t,s%4===0?0.14:s%2===0?0.10:0.07);
    // Crushing bass riff (E power chord movement)
    const BB=[82,82,0,98,110,0,82,0,98,110,0,82,98,0,82,0];
    if(BB[s]){this._bass(t,BB[s],bt*0.45,0.7);this._bass(t,BB[s]*1.006,bt*0.45,0.25);}// slight detune
    // Crusher chord stabs
    if(s===0||s===8)this._chord(t,[164,196,246],0.07,0.3);
    if(s===6||s===14)this._chord(t,[174,220,261],0.06,0.35);
    // Scream lead
    if(s===4)this._lead(t,[220,277,329][b%3],0.12,0.28);
    if(s===12)this._lead(t,[246,311,370][b%3],0.10,0.28);
  }

  // ── SEXY/VICTORY mode: 128 BPM euphoric dance anthem (A major) ──────────
  _sexy(){
    const bt=60/128,t=this._now(),b=this._beat,s=b%16;
    // 4-on-the-floor kick — classic euphoric dance
    this._kick(t,1.0);
    // Punchy snare on 2 and 4, ghost accent on 3.5
    if(s===4||s===12)this._snare(t,0.78);
    if(s===10)this._snare(t,0.28); // ghost
    // 8th hats, bright open on the "and" of every beat
    if(s%4===2)this._hat(t,0.32,true);
    else this._hat(t,s%2===1?0.22:0.13);
    // Driving bass riff — A major (A/D/E root movement for uplift)
    const SB=[110,0,110,0,138,0,165,138,110,0,110,146,165,0,165,110];
    if(SB[s])this._bass(t,SB[s],bt*0.5,0.72);
    // Big triumphant chord stabs on every beat
    // Progression: A → D → E → A  (classic uplifting I-IV-V-I)
    const CHORDS=[[220,277,330],[146,185,220],[165,207,247],[220,277,330]];
    const ci=Math.floor(b/4)%4;
    if(s===0)this._chord(t,CHORDS[ci],bt*0.7,0.32);
    if(s===8)this._chord(t,CHORDS[(ci+2)%4],bt*0.7,0.28);
    // Offbeat jabs for bounce
    if(s===2||s===6||s===10||s===14)this._chord(t,CHORDS[ci],bt*0.25,0.16);
    // Victory lead melody — triumphant A major fanfare every 2 bars
    if(b%32===0){
      [330,440,554,440,494,554,440,494].forEach((f,i)=>this._lead(t+i*bt*0.5,f,bt*0.42,0.32));
    }
    if(b%32===16){
      [220,277,330,370,440,494,554,659].forEach((f,i)=>this._lead(t+i*bt*0.5,f,bt*0.42,0.3));
    }
    // Extra high stab riff every bar for shimmer
    if(s===4){[440,554,659,554,440,330,440,494].forEach((f,i)=>this._lead(t+i*bt*0.25,f,bt*0.22,0.18));}
    // Bright pad wash (major colour, not minor)
    if(s===0&&b%32===0)[220,277,330,440].forEach((f,i)=>this._pad(t+i*0.03,f,bt*8,0.18));
    if(s===0&&b%32===16)[165,207,247,330].forEach((f,i)=>this._pad(t+i*0.03,f,bt*8,0.16));
    // BIG horn blast on phrase starts (every 4 bars, beat 1)
    if(s===0&&b%64===0)[440,554,659].forEach((f,i)=>this._lead(t+i*0.018,f,0.24,0.38));
    if(s===0&&b%64===32)[330,415,494].forEach((f,i)=>this._lead(t+i*0.018,f,0.24,0.34));
  }
}
