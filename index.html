// ════════════════════════════════════════════════════════════════
//  CLUB AUDIO  (Web Audio API — procedural 128-BPM soundtrack)
// ════════════════════════════════════════════════════════════════
class ClubAudio{
  constructor(){this._ctx=null;this._master=null;this._on=false;}
  unlock(){
    if(this._on)return;
    try{
      // Reuse shared AudioContext
      this._ctx=getGameAC();
      if(!this._ctx)return;
      this._master=this._ctx.createGain();this._master.gain.value=0.5;
      this._master.connect(this._ctx.destination);
      this._on=true;
    }catch(e){/*no audio*/}
  }
  get now(){return this._ctx?.currentTime??0;}
  get ok(){return this._on&&!!this._ctx;}
  _osc(freq,type,vol,t,dur){
    if(!this.ok)return;
    const o=this._ctx.createOscillator(),g=this._ctx.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(0.001,t);g.gain.linearRampToValueAtTime(vol,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(this._master);o.start(t);o.stop(t+dur+0.05);
  }
  _noise(vol,t,dur,hp=8000){
    if(!this.ok)return;
    const sr=this._ctx.sampleRate,n=Math.ceil(sr*dur);
    const buf=this._ctx.createBuffer(1,n,sr),d=buf.getChannelData(0);
    for(let i=0;i<n;i++)d[i]=Math.random()*2-1;
    const src=this._ctx.createBufferSource();src.buffer=buf;
    const f=this._ctx.createBiquadFilter();f.type='highpass';f.frequency.value=hp;
    const g=this._ctx.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    src.connect(f);f.connect(g);g.connect(this._master);src.start(t);src.stop(t+dur+0.02);
  }
  kick(t=this.now){this._osc(130,'sine',1.3,t,0.45);this._osc(55,'sine',0.7,t,0.28);this._noise(0.28,t,0.018,200);}
  snare(t=this.now){this._osc(210,'triangle',0.55,t,0.09);this._noise(0.38,t,0.11,2200);}
  hihat(t=this.now,op=false){this._noise(op?0.18:0.11,t,op?0.14:0.035,9500);}
  bass(t=this.now,fr=80){this._osc(fr,'sawtooth',0.38,t,0.20);this._osc(fr*2,'sawtooth',0.12,t,0.20);}
  lead(t=this.now,fr=440){this._osc(fr,'square',0.10,t,0.16);this._osc(fr*1.5,'square',0.04,t,0.12);}
  crash(t=this.now){this._noise(0.55,t,1.1,4800);this._osc(550,'sawtooth',0.25,t,0.7);}
  bigDrop(t=this.now){
    if(!this.ok)return;
    const o=this._ctx.createOscillator(),g=this._ctx.createGain();
    o.frequency.setValueAtTime(110,t);o.frequency.exponentialRampToValueAtTime(28,t+1.3);
    g.gain.setValueAtTime(2.0,t);g.gain.exponentialRampToValueAtTime(0.001,t+1.5);
    o.connect(g);g.connect(this._master);o.start(t);o.stop(t+1.6);
    this.crash(t);
  }
  // 80s disco string pad (lush sawtooth chord)
  strings(t=this.now,freq=220,vol=0.07,dur=0.5){
    if(!this.ok)return;
    // Three slightly detuned oscillators for the classic strings sound
    [freq,freq*1.003,freq*0.997].forEach(f=>{
      const o=this._ctx.createOscillator(),g=this._ctx.createGain();
      const lp=this._ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=2800;lp.Q.value=0.7;
      o.type='sawtooth';o.frequency.setValueAtTime(f,t);
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.04);
      g.gain.setValueAtTime(vol,t+dur-0.08);g.gain.linearRampToValueAtTime(0,t+dur);
      o.connect(lp);lp.connect(g);g.connect(this._master);o.start(t);o.stop(t+dur+0.05);
    });
  }
  // 80s disco "woo!" rising glide
  discoWoo(t=this.now){
    if(!this.ok)return;
    const o=this._ctx.createOscillator(),g=this._ctx.createGain();
    o.type='sine';o.frequency.setValueAtTime(320,t);o.frequency.exponentialRampToValueAtTime(880,t+0.35);
    g.gain.setValueAtTime(0.001,t);g.gain.linearRampToValueAtTime(0.22,t+0.1);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.38);
    o.connect(g);g.connect(this._master);o.start(t);o.stop(t+0.42);
  }
}

// ════════════════════════════════════════════════════════════════
//  BEAT SYSTEM  (BPM grid, FLOW meter, on-beat detection)
// ════════════════════════════════════════════════════════════════
class BeatSystem{
  constructor(scene,bpm=128){
    this.scene=scene;this.bpm=bpm;this.beatMs=60000/bpm;
    this._flow=0;this._nextBeatT=0;this._beatN=0;
    this._beatWindow=82;           // ±ms around beat centre
    this._pumped=false;this._dropActive=false;this._dropEndT=0;
    this.audio=new ClubAudio();
    this._buildHUD();
    // strobe rectangle
    this._strobe=scene.add.rectangle(GW/2,GH/2,GW,GH,0xffffff,0).setDepth(50).setScrollFactor(0);
    // edge-glow graphics
    this._edge=scene.add.graphics().setDepth(49).setScrollFactor(0);
    // on-beat pip
    this._pip=scene.add.text(GW-8,HUD_H+5,'♩',{fontFamily:'Arial',fontSize:'13px',color:'#ff0088'})
      .setOrigin(1,0).setDepth(52).setAlpha(0);
  }
  _buildHUD(){
    const s=this.scene,bw=152,bh=7,bx=GW/2,by=HUD_H-13;
    s.add.rectangle(bx,by,bw+4,bh+4,0x110022,1).setDepth(51).setScrollFactor(0).setOrigin(.5,.5);
    this._bar=s.add.rectangle(bx-bw/2,by,0,bh,C.pink,1).setDepth(52).setScrollFactor(0).setOrigin(0,.5);
    s.add.text(bx-bw/2-3,by,'FLOW',{fontFamily:'Impact',fontSize:'7px',color:'#cc0066'}).setDepth(52).setScrollFactor(0).setOrigin(1,.5);
    this._flowLabel=s.add.text(bx,by,'',{fontFamily:'Impact',fontSize:'7px',color:'#ffee00'}).setDepth(52).setScrollFactor(0).setOrigin(.5,.5);
  }
  start(){
    this.audio.unlock();
    this._nextBeatT=this.scene.time.now+900;
    this._scheduleBatch(0);
  }
  _scheduleBatch(offset){
    for(let i=0;i<8;i++){
      const tMs=this._nextBeatT+offset+i*this.beatMs;
      const delay=tMs-this.scene.time.now;
      if(delay<0)continue;
      this.scene.time.delayedCall(delay,()=>this._fire((this._beatN+i)%8));
    }
    // queue next batch
    const nextMs=this._nextBeatT+offset+8*this.beatMs;
    this.scene.time.delayedCall(nextMs-this.scene.time.now-this.beatMs,()=>{
      this._nextBeatT=nextMs;this._beatN=(this._beatN+8)%8;this._scheduleBatch(0);
    });
  }
  _fire(n){
    if(!this.scene.scene.isActive())return;
    const a=this.audio,t=a.now,flow=this._flow;
    // Layer 1: drums (always)
    a.kick(t);a.hihat(t+this.beatMs*0.5/1000);
    a.hihat(t+this.beatMs*0.25/1000);a.hihat(t+this.beatMs*0.75/1000);
    if(n===2||n===6)a.snare(t);
    // Layer 2: bass (flow>25)
    if(flow>25){const bf=[80,80,60,80,100,80,55,80];a.bass(t,bf[n]);}
    // Layer 3: lead melody (flow>55)
    if(flow>55){const ml=[440,0,523,0,587,523,0,440];if(ml[n])a.lead(t,ml[n]);}
    // Layer 4: 80s disco strings — lush chord stabs every quarter note (beat 0,2,4,6)
    if(n%2===0){
      // Cycle through Dm7 / Am7 / Gm7 chord tones: D4=293.7, F4=349.2, A4=440, C5=523.3
      const chords=[[293.7,349.2,440],[440,523.3,587.3],[196,246.9,293.7],[220,261.6,329.6]];
      const ch=chords[Math.floor(this._beatN/2)%chords.length];
      ch.forEach((f,i)=>a.strings(t+i*0.008,f,0.055,this.beatMs*1.8/1000));
    }
    // 80s disco "woo!" every 32 beats (every 4 bars)
    if(this._beatN%32===0&&this._beatN>0)a.discoWoo(t);
    // Full drop at 100
    if(flow>=100&&!this._dropActive)this._triggerDrop();
    // Visuals
    this._onBeatVisual();
  }
  _onBeatVisual(){
    const s=this.scene,col=this._pumped?C.yellow:(this._flow>45?C.cyan:C.pink);
    // strobe
    this._strobe.setAlpha(this._pumped?0.22:0.09);
    s.tweens.killTweensOf(this._strobe);
    s.tweens.add({targets:this._strobe,alpha:0,duration:55});
    // edge pulse
    this._edge.clear();
    this._edge.lineStyle(this._pumped?7:4,col,0.85);
    this._edge.strokeRect(1,1,GW-2,GH-2);
    this._edge.setAlpha(1);
    s.tweens.killTweensOf(this._edge);
    s.tweens.add({targets:this._edge,alpha:0,duration:200});
    // pip
    this._pip.setAlpha(1);
    s.tweens.killTweensOf(this._pip);
    s.tweens.add({targets:this._pip,alpha:0,duration:250});
    // disco floor flash (nightclub tile glow)
    if(this.scene._floorTiles){
      this.scene._floorTiles.setAlpha(0.55);
      s.tweens.add({targets:this.scene._floorTiles,alpha:0.18,duration:350});
    }
  }
  _triggerDrop(){
    this._dropActive=true;this._dropEndT=this.scene.time.now+3500;
    const s=this.scene;
    this.audio.bigDrop(this.audio.now);
    s.cameras.main.shake(550,0.020);
    // slow-mo burst
    s.physics.world.timeScale=5;
    setTimeout(()=>{if(s.physics)s.physics.world.timeScale=1;},2200);
    // stun all enemies
    [...s.enemies.getChildren(),...(s.boss?.active?[s.boss]:[])].forEach(e=>{
      if(e.active)e.iF=Math.max(e.iF||0,1400);
    });
    // shockwave rings
    for(let i=0;i<5;i++)s.time.delayedCall(i*110,()=>{
      const r=s.add.image(GW/2,GH/2,'ring').setScale(.5).setDepth(55).setTint(C.yellow);
      s.tweens.add({targets:r,scaleX:9,scaleY:5,alpha:0,duration:650,ease:'Quad.Out',onComplete:()=>r.destroy()});
    });
    // big flash
    this._strobe.setAlpha(.7);s.tweens.add({targets:this._strobe,alpha:0,duration:380});
    s._bigPop('★ FULL DROP!! ★',C.yellow);
    s.time.delayedCall(3500,()=>{this._dropActive=false;this._flow=Math.max(0,this._flow-65);});
  }
  update(t,dt){
    // drain flow
    this._flow=Math.max(0,this._flow-dt*0.0048);
    const wasPumped=this._pumped;
    this._pumped=this._flow>=80;
    if(this._pumped&&!wasPumped)this.scene._pop('IN THE ZONE!!',C.yellow,GW/2,GH/2-50,false);
    // HUD
    const pct=this._flow/100,bw=152;
    this._bar.width=bw*pct;
    this._bar.setFillStyle(this._flow>=100?C.yellow:this._flow>60?C.cyan:C.pink);
    this._bar.setAlpha(this._pumped?(.7+Math.sin(t*0.012)*.3):1);
    this._flowLabel.setText(this._pumped?'PUMPED!':this._dropActive?'DROP!':'');
  }
  // Returns true if current Phaser time is within beat window
  isOnBeat(){
    if(!this._nextBeatT)return false;
    const now=this.scene.time.now;
    // check proximity to nearest beat
    const mod=((now-this._nextBeatT)%this.beatMs+this.beatMs)%this.beatMs;
    return mod<this._beatWindow||mod>(this.beatMs-this._beatWindow);
  }
  registerHit(){
    if(this.isOnBeat()){
      this._flow=Math.min(100,this._flow+13);
      return true;
    }else{
      this._flow=Math.max(0,this._flow-3);
      return false;
    }
  }
  getMultiplier(){
    if(this._dropActive)return 3.0;
    if(this._pumped)return 1.85;
    if(this.isOnBeat())return 1.5;
    return 0.8;
  }
}

// ════════════════════════════════════════════════════════════════
//  DISCO BALL  (pendulum physics + light beams + wrecking ball)
// ════════════════════════════════════════════════════════════════
class DiscoBall{
  constructor(scene){
    this.scene=scene;
    this.ancX=GW/2;this.ancY=HUD_H+4;
    this.len=110;this.angle=0.06;this.angV=0.014;
    this._bx=this.ancX;this._by=this.ancY+this.len;
    this._hitFlash=0;
    this._buildTexture();
    this.img=scene.add.image(this._bx,this._by,'discoball').setDepth(8).setScale(1.3);
    this.ropeG=scene.add.graphics().setDepth(7);
    this.beamG=scene.add.graphics().setDepth(2);
    // anchor hook
    const hk=scene.add.graphics().setDepth(8);
    hk.fillStyle(0x888888,1);hk.fillCircle(this.ancX,this.ancY,5);
    hk.lineStyle(2,0x666666,.8);hk.lineBetween(this.ancX-8,this.ancY,this.ancX+8,this.ancY);
  }
  _buildTexture(){
    const g=this.scene.make.graphics({add:false}),r=15;
    g.fillStyle(0x777777,1);g.fillCircle(r,r,r);
    // mirror tiles
    const tc=[0xffffff,0xeeeeff,C.pink,C.cyan,C.yellow,0xaaaaaa];
    for(let row=-r+3;row<r-2;row+=5)for(let col=-r+3;col<r-2;col+=5){
      if(Math.sqrt(row*row+col*col)>r-2)continue;
      g.fillStyle(tc[Math.abs(row+col)%tc.length],.9);g.fillRect(r+col-1,r+row-1,3,3);
    }
    // shine
    g.fillStyle(0xffffff,.7);g.fillCircle(r-5,r-5,3);
    g.generateTexture('discoball',r*2,r*2);g.destroy();
  }
  update(dt){
    const s=Math.min(dt,50)/1000,L=this.len/75;
    this.angV+=-(9.8/L)*Math.sin(this.angle)*s;
    this.angV*=(1-0.011*s*60);
    this.angle+=this.angV*s;
    this._bx=this.ancX+Math.sin(this.angle)*this.len;
    this._by=this.ancY+Math.cos(this.angle)*this.len;
    this.img.setPosition(this._bx,this._by).setRotation(this.angle*0.4);
    // rope
    this.ropeG.clear();
    this.ropeG.lineStyle(2,0x888888,.9);
    this.ropeG.lineBetween(this.ancX,this.ancY,this._bx,this._by);
    // beams
    this.beamG.clear();
    const sp=Math.abs(this.angV);
    if(sp>0.04)this._drawBeams(sp);
    // flash
    if(this._hitFlash>0){this.img.setTintFill(0xffffff);this._hitFlash-=dt;}
    else this.img.clearTint();
  }
  _drawBeams(sp){
    const bc=[C.pink,C.cyan,C.yellow,C.green,C.purple,C.orange];
    const nb=Math.min(10,3+Math.floor(sp*8));
    const al=Math.min(0.55,sp*0.7);
    for(let i=0;i<nb;i++){
      const a=(i/nb)*Math.PI*2+this.angle*5+performance.now()*0.0004;
      this.beamG.lineStyle(2,bc[i%bc.length],al*.8);
      this.beamG.lineBetween(this._bx,this._by,this._bx+Math.cos(a)*380,this._by+Math.sin(a)*380);
    }
    if(sp>0.18){
      // floor spotlight
      const sx=this._bx+Math.sin(this.angle*3)*60;
      this.beamG.fillStyle(C.yellow,.06+sp*.06);
      this.beamG.fillCircle(sx,FLOOR_Y,50+sp*30);
    }
  }
  hit(fromX){
    const dir=fromX<this._bx?1:-1;
    this.angV+=dir*0.75;
    this._hitFlash=90;
    this.scene.ie.sparks(this._bx,this._by,6);
    this.scene.ie.ring(this._bx,this._by,C.yellow);
    this.scene._pop('DISCO HIT!',C.yellow,this._bx,this._by-20,true);
  }
  getHitZone(){
    return{x:this._bx,y:this._by,r:26,active:Math.abs(this.angV)>0.55,dmg:Math.floor(Math.abs(this.angV)*28)};
  }
  nearPlayer(px,py){return Math.abs(px-this._bx)<55&&Math.abs(py-50-this._by)<70;}
}

// ════════════════════════════════════════════════════════════════
//  DJ BOOTH  (AOE bass drop, tempo shift, zero-g)
// ════════════════════════════════════════════════════════════════
class DJBooth{
  constructor(scene,x){
    this.scene=scene;this.x=x;this.y=FLOOR_Y;
    this._cd=0;
    this._draw();
  }
  _draw(){
    const s=this.scene,x=this.x,y=this.y;
    const g=s.add.graphics().setDepth(3);
    // body
    g.fillStyle(0x1a0933,1);g.fillRect(x-54,y-82,108,82);
    g.fillStyle(0x0d001a,1);g.fillRect(x-47,y-74,94,62);
    // turntables
    g.fillStyle(0x1a1a2e,1);g.fillEllipse(x-25,y-47,40,40);g.fillEllipse(x+25,y-47,40,40);
    g.fillStyle(0x0d0d18,1);g.fillEllipse(x-25,y-47,30,30);g.fillEllipse(x+25,y-47,30,30);
    g.fillStyle(0x440011,1);g.fillCircle(x-25,y-47,4);g.fillCircle(x+25,y-47,4);
    g.lineStyle(1,0x3300aa,.5);g.strokeEllipse(x-25,y-47,38,38);g.strokeEllipse(x+25,y-47,38,38);
    // mixer centre
    g.fillStyle(0x220033,1);g.fillRect(x-9,y-73,18,38);
    g.fillStyle(0x00aacc,.9);g.fillRect(x-6,y-62,12,4);
    // neon brand sign
    const sgn=s.add.text(x,y-92,'⚡ DJ BOOTH ⚡',{fontFamily:'Impact',fontSize:'11px',color:'#cc00ff',stroke:'#000',strokeThickness:2}).setOrigin(.5,1).setDepth(4);
    s.tweens.add({targets:sgn,alpha:.35,duration:700,yoyo:true,repeat:-1});
    // animated EQ bars
    const ec=[C.pink,C.cyan,C.yellow,C.green,C.purple];
    this._eq=ec.map((c,i)=>{
      const b=s.add.rectangle(x-36+i*10,y-10,7,6,c,1).setDepth(4).setOrigin(.5,1);
      s.tweens.add({targets:b,scaleY:Phaser.Math.FloatBetween(2.5,5),duration:Phaser.Math.Between(130,320),yoyo:true,repeat:-1,delay:i*70});
      return b;
    });
    this._prompt=s.add.text(x,y-100,'[E] USE BOOTH',{fontFamily:'Impact',fontSize:'12px',color:'#00f0ff',stroke:'#000',strokeThickness:3}).setOrigin(.5,1).setDepth(5).setAlpha(0);
  }
  update(player,dt){
    if(this._cd>0)this._cd-=dt;
    const near=Math.abs(player.x-this.x)<90;
    this._prompt.setAlpha(near&&this._cd<=0?1:0);
    return near&&this._cd<=0;
  }
  activate(beatSys){
    if(this._cd>0)return;
    this._cd=5500;
    const opts=[
      ()=>this._bassDrop(beatSys),
      ()=>this._bassDrop(beatSys), // heavier bass drop bias
      ()=>this._tempoShift(beatSys),
    ];
    opts[Phaser.Math.Between(0,opts.length-1)]();
  }
  _bassDrop(bs){
    const s=this.scene;
    bs?.audio.bigDrop(bs.audio.now);
    s.cameras.main.shake(900,0.022);
    s._pop('BASS DROP!!',C.yellow,GW/2,GH/2-50,false);
    const targets=[...s.enemies.getChildren(),...(s.boss?.active?[s.boss]:[])];
    targets.forEach(e=>{
      if(!e.active)return;
      const dist=Math.abs(e.x-this.x);
      if(dist>440)return;
      const dmg=Math.floor((1-dist/440)*50+12);
      const hd={...HITS.CROSS,dmg};
      (e instanceof Boss?e.takeDmg(dmg,hd,this.x):e.takeDmg(dmg,hd,this.x));
      s.ie.explode(e.x,e.y-40);s.ie.dmgTxt(e.x,e.y-80,dmg,false,C.yellow);
    });
    for(let i=0;i<5;i++)s.time.delayedCall(i*100,()=>{
      const r=s.add.image(this.x,FLOOR_Y-30,'ring').setScale(.3).setDepth(20).setTint(C.yellow);
      s.tweens.add({targets:r,scaleX:7,scaleY:3.5,alpha:0,duration:750,ease:'Quad.Out',onComplete:()=>r.destroy()});
    });
    if(bs)bs._flow=Math.min(100,bs._flow+35);
  }
  _tempoShift(bs){
    if(!bs)return;
    const was=bs.bpm;bs.bpm=165;bs.beatMs=60000/165;
    this.scene._pop('BPM: 165!!',C.pink,GW/2,GH/2-50,false);
    this.scene.time.delayedCall(9000,()=>{bs.bpm=was;bs.beatMs=60000/was;this.scene._pop('BPM RESTORED',C.cyan,GW/2,GH/2-50,true);});
  }
}

// ════════════════════════════════════════════════════════════════
//  GAME SCENE
// ════════════════════════════════════════════════════════════════
class GameScene extends Phaser.Scene{
  constructor(){super({key:'GameScene'});}
  preload(){}

  create(){
    buildTextures(this);
    buildBG(this);

    // ── Physics: world bounds for left/right walls + deep bottom safety ──
    // Static floor rectangle is the real floor (more reliable than world bounds bottom)
    this.physics.world.setBounds(0,-2000,GW,GH+2000);

    // ── Static floor body ─────────────────────────────────────────
    // A transparent rectangle whose TOP edge is at FLOOR_Y.
    // All entities collide with this — it IS the ground.
    // Make floor 400px thick so hitstop tunneling can never skip past it
    const _fb=this.add.rectangle(GW/2,FLOOR_Y+200,GW,400,0x000000,0);
    this.physics.add.existing(_fb,true);
    this._floor=_fb;
    // worldstep Y-clamp: runs on every physics substep so hitstop can't tunnel entities below FLOOR_Y
    this.physics.world.on('worldstep',()=>{
      const clamp=(b)=>{if(b&&b.bottom>FLOOR_Y){b.y=FLOOR_Y-b.height;if(b.velocity.y>0)b.velocity.y=0;}};
      if(this.enemies)this.enemies.getChildren().forEach(e=>{if(e.body)clamp(e.body);});
      if(this.boss?.body)clamp(this.boss.body);
      if(this.player?.body)clamp(this.player.body);
    });

    // Systems
    this.ie=new ImpactEngine(this);
    this.cs=new ComboSys();
    this.muts={};this._mutList=[];
    this._stageIdx=0;this._pending=false;
    this._score=0;this.puddles=[];
    this._pudTimer=null;
    this._bossMode=false;
    this._schlongDmgCd=0;
    this._clubBGBuilt=false;
    this._stageFlair=null;this._stageSignObjs=[];
    // Music engine (procedural ambient tracks for L1, boss, end screen)
    this._music=new MusicEngine();

    // Nightclub systems (null until NEON RUPTURE stage)
    this.beatSys=null;this.discoBall=null;this.djBooth=null;
    this._floorTiles=null;this._clubActive=false;

    // Groups
    this.enemies=this.physics.add.group();
    this.peeDrops=[];    // plain array — PeeDrop is manually updated, no physics
    this.glitterDrops=[]; // plain array — GlitterDrop is manually updated, no physics

    // Player
    this.player=new Player(this,170,FLOOR_Y);
    this.boss=null;

    // ── Floor colliders (static floor acts as ground for everyone) ──
    this.physics.add.collider(this.player,this._floor);
    this.physics.add.collider(this.enemies,this._floor);
    // peeDrops is now a plain array — no physics collider needed

    // HUD
    this._topHUD=new TopHUD(this);
    this._comboHUD=new ComboHUD(this);
    this._stageHUD=new StageHUD(this);
    this.add.text(GW/2,GH-4,'WASD=move  SPACE=jump  J=punch  K=kick  G=grapple  E=booth(club)',{fontFamily:'Arial',fontSize:'9px',color:'#243040'}).setOrigin(.5,1).setScrollFactor(0).setDepth(12);

    // Callbacks
    this.cs.onChange=n=>this._comboHUD.update(n);
    this.cs.onEnd=n=>{this._comboHUD.reset();if(n>=3)this._pop(`${n} HIT COMBO!`,n>=10?C.yellow:C.pink,GW/2,GH/2-30,false);};
    this.events.on('playerHp',hp=>this._topHUD.setHp(hp,this.player.maxHp));
    this.events.on('enemyKilled',()=>this._checkWaveClear());
    this.events.on('bossHp',(hp,max)=>this._topHUD.setBossHp(hp,max));
    this.events.on('bossKilled',()=>{
      if(STAGES[this._stageIdx]&&STAGES[this._stageIdx].boss2){this._victory();}
      else{this._levelClear();}
    });
    this.events.on('playerDead',()=>this._gameOver());

    this._setupDebug();

  _intro(){
    const t=this.add.text(GW/2,GH/2-50,'BLOODRIOT',{fontFamily:'Impact, Arial Black',fontSize:'90px',color:'#ff0088',stroke:'#000',strokeThickness:10}).setOrigin(.5,.5).setAlpha(0).setDepth(25);
    const s=this.add.text(GW/2,GH/2+30,'NEON BRAWL',{fontFamily:'Impact, Arial Black',fontSize:'34px',color:'#00f0ff',stroke:'#000',strokeThickness:6}).setOrigin(.5,.5).setAlpha(0).setDepth(25);
    this.tweens.add({targets:t,alpha:1,duration:400,yoyo:true,hold:1000,onComplete:()=>t.destroy()});
    this.tweens.add({targets:s,alpha:1,delay:200,duration:400,yoyo:true,hold:1000,onComplete:()=>s.destroy()});
  }

  _startStage(idx){
    if(this._pending)return;
    this._stageIdx=idx;
    const sd=STAGES[idx];
    this._topHUD.setStage(idx+1,sd.label);
    this._stageHUD.set(idx+1);

    // Apply stage-specific BG flair for Level 1; clean up flair when entering Level 2
    if(sd.level===1){
      this._applyStageFlair(sd.bgStyle||'city');
    } else {
      // Destroy any leftover L1 flair so disco floor isn't covered
      if(this._stageFlair){try{this._stageFlair.destroy();}catch(e){}this._stageFlair=null;}
      if(this._stageSignObjs){this._stageSignObjs.forEach(o=>{try{o.destroy();}catch(e){}});this._stageSignObjs=[];}
    }

    if(sd.boss){
      this._bossMode=true;
      // Boss2 stage: ensure club is running for disco floor
      if(sd.boss2){
        if(!this._clubBGBuilt)this._startClub(idx,sd);
        // Always apply VIP flair for boss2 stage (even if club was pre-built)
        this._applyClubStageFlair(idx,sd);
        this._boss2Intro();
      } else {
        // L1 boss fight — stop groove, play aggressive music
        this._music.stop();
        this._music.play('boss1');
        this._bossIntro();
      }
    } else if(sd.club){
      this._bossMode=false;
      this._clubActive=true;
      // Stop L1 groove when entering club (BeatSystem takes over)
      this._music.stop();
      this._startClub(idx,sd);
    } else {
      this._bossMode=false;
      // L1 normal stages — play groove music
      if(sd.level===1)this._music.play('groove');
      const total=sd.grunts+sd.heavies;
      for(let i=0;i<sd.grunts;i++) this._spawnEnemy('grunt',i,total);
      for(let i=0;i<sd.heavies;i++) this._spawnEnemy('heavy',sd.grunts+i,total);
      this._pop(`STAGE ${idx+1} — ${sd.label}`,C.pink,GW/2,GH/2-55,false);
    }
  }

  _startClub(idx,sd){
    // Guard: only build club BG and audio systems once
    if(!this._clubBGBuilt){
      this._clubBGBuilt=true;
      buildNightclubBG(this);
      this.beatSys=new BeatSystem(this,128);
      this.beatSys.start();
      this.discoBall=new DiscoBall(this);
      this.djBooth=new DJBooth(this,110);
      this._eKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);
    } // end club BG guard

    // Apply per-club-stage visual flair (distinct look for each area)
    this._applyClubStageFlair(idx,sd);

    // Spawn enemies (every club stage spawns fresh enemies)
    if(sd&&sd.grunts+sd.heavies>0){
      const total=sd.grunts+sd.heavies;
      for(let i=0;i<sd.grunts;i++)this._spawnEnemy('grunt',i,total);
      for(let i=0;i<sd.heavies;i++)this._spawnEnemy('heavy',sd.grunts+i,total);
    }

    // Stage label pop
    this.time.delayedCall(200,()=>{
      const nm=sd&&sd.label?sd.label:'THE CLUB';
      this._bigPop(`♪ ${nm} ♪`,C.cyan);
      if(!sd?.boss2)this.time.delayedCall(1100,()=>this._pop('HIT ON THE BEAT FOR BONUS!!',C.yellow,GW/2,GH/2-30,false));
    });
  }

  // ── DEBUG MENU (toggle with § / backtick) ────────────────────
  _setupDebug(){
    this._dbg={open:false,god:false,ui:[]};
    const scene=this;
    // Wrap player.hit for god-mode
    const origHit=this.player.hit.bind(this.player);
    this.player.hit=function(...a){ if(scene._dbg.god)return; return origHit(...a); };
    // Toggle handler — very permissive to handle various keyboard layouts
    const handler=(ev)=>{
      const k=ev.key, c=ev.code;
      if(k==='§'||k==='½'||k==='~'||k==='`'
         ||c==='IntlBackslash'||c==='Backquote'
         ||ev.keyCode===192||ev.keyCode===220||ev.keyCode===223
         ||ev.which===167){
        if(ev.preventDefault)ev.preventDefault();
        scene._toggleDebug();
      }
    };
    // Bind at BOTH DOM and Phaser levels so it fires regardless of focus
    window.addEventListener('keydown',handler);
    this.input.keyboard.on('keydown',handler);
    this._dbgHandler=handler;
    // Visible on-screen toggle button (top-right, under HUD) as fallback
    const btn=this.add.rectangle(GW-42,14,72,20,0x220033,0.85).setStrokeStyle(1,0xff0088).setScrollFactor(0).setDepth(99).setInteractive({useHandCursor:true});
    const btnTxt=this.add.text(GW-42,14,'§ DEBUG',{fontFamily:'Impact',fontSize:'12px',color:'#ff0088'}).setOrigin(.5,.5).setScrollFactor(0).setDepth(99);
    btn.on('pointerdown',()=>this._toggleDebug());
  }

  _jumpStage(i){
    const s=this;
    s._pending=false;s._bossMode=false;
    s.enemies.getChildren().forEach(e=>{try{e.destroy();}catch(ex){}});
    if(s.boss){try{s.boss.destroy();}catch(e){}s.boss=null;}
    if(s._topHUD?.setBossHp)s._topHUD.setBossHp(0,0);
    s.player.setPosition(170,FLOOR_Y);
    s.player.hp=s.player.maxHp;s.player.iF=0;
    s.events.emit('playerHp',s.player.hp);
    s._closeDebug();
    s._startStage(i);
  }

  _checkWaveClear(){
    if(this._pending||this._bossMode)return;
    this.time.delayedCall(120,()=>{
      const alive=this.enemies.getChildren().filter(e=>e.es!==ES.DEAD&&e.active).length;
      if(alive===0&&!this._pending){
        this._pending=true;
        // Give pts for wave clear
        this._score+=500+this._stageIdx*200;
        this.time.delayedCall(1000,()=>{
          const picks=pickMuts(this._mutList);
          if(picks.length===0){this._afterMut(null);}
          else{new MutPicker(this,picks,m=>this._afterMut(m));}
        });
      }
    });
  }

  _afterMut(m){
    if(m){
      this.muts[m.id]=true;this._mutList.push(m.id);
      if(m.id==='BERSERKER')this.cs.win=2800;
      this._pop(`${m.name}!`,m.col,GW/2,GH/2-25,false);
      this._topHUD.boon(m.badge);
    }
    this._pending=false;
    const next=this._stageIdx+1;
    if(next<STAGES.length){this.time.delayedCall(900,()=>this._stageTransition(()=>this._startStage(next)));}
  }

    const s=this;
    const bkCol=Phaser.Utils.Array.GetRandom([C.pink,C.cyan,C.purple,0xffee00,C.orange]);
    const skin=0xf4a460, hair=0x1a0800;
    let phase=0;

    // Graphics positioned so (0,0) = dancer's feet in world space
    const g=s.add.graphics().setDepth(depth).setPosition(x,y);

    const draw=()=>{
      g.clear();
      // ─ hair ─
      g.fillStyle(hair,1);g.fillRect(-14,-95,28,14);
      // ─ head ─
      g.fillStyle(skin,1);g.fillRect(-12,-89,24,22);
      // ─ eyes ─
      g.fillStyle(0x111111,1);g.fillRect(-8,-85,5,4);g.fillRect(3,-85,5,4);
      // ─ neck ─
      g.fillStyle(skin,1);g.fillRect(-5,-67,10,8);
      // ─ bikini top ─
      g.fillStyle(bkCol,1);g.fillRect(-17,-59,34,11);
      // ─ midriff (bare skin) ─
      g.fillStyle(skin,1);g.fillRect(-13,-48,26,8);
      // ─ bikini bottom ─
      g.fillStyle(bkCol,1);g.fillRect(-15,-40,30,11);
      // ─ arms (vary by phase) ─
      g.fillStyle(skin,1);
      if(phase===0){g.fillRect(-28,-59,14,22);g.fillRect(14,-59,14,22);}       // arms out
      else if(phase===1){g.fillRect(-28,-78,14,30);g.fillRect(14,-59,14,22);}  // L arm up
      else if(phase===2){g.fillRect(-28,-59,14,22);g.fillRect(14,-78,14,30);}  // R arm up
      else{g.fillRect(-28,-83,14,30);g.fillRect(14,-83,14,30);}                // both arms high
      // ─ legs (vary by phase) ─
      g.fillStyle(skin,1);
      if(phase===0){g.fillRect(-21,-29,12,32);g.fillRect(9,-29,12,32);}
      else if(phase===1){g.fillRect(-25,-29,13,30);g.fillRect(9,-29,12,28);g.fillRect(-29,-1,14,8);g.fillRect(9,-1,12,8);}
      else if(phase===2){g.fillRect(-21,-29,12,28);g.fillRect(12,-29,13,30);g.fillRect(-21,-1,12,8);g.fillRect(12,-1,14,8);}
      else{g.fillRect(-24,-29,13,22);g.fillRect(11,-29,13,22);g.fillRect(-28,-7,13,14);g.fillRect(15,-7,13,14);}
      // ─ sandals ─
      g.fillStyle(bkCol,1);g.fillRect(-26,-2,18,5);g.fillRect(8,-2,18,5);

    draw();

    const bOff=Phaser.Math.Between(0,400);

      yoyo:true,repeat:-1,ease:'Sine.InOut',delay:bOff});

    // Cycle animation frames
    s.time.addEvent({delay:Phaser.Math.Between(130,190),loop:true,callback:()=>{
      phase=(phase+1)%4;draw();
    }});

    // Hearts popping off
    s.time.addEvent({delay:Phaser.Math.Between(600,1300),loop:true,callback:()=>{
      const hx=x+Phaser.Math.Between(-22,22);
      const ht=s.add.text(hx,y-100,'♥',{

  update(t,dt){
    if(!this.player?.active)return;
    this._stageHUD.tick(dt);

    // ── Player hitbox vs enemies ─────────────────────────────────
    if(this.player.hb?.active){
      const hb=this.player.hb;
      const explosive=this.muts.EXPLOSIVE;
      const x2=this.muts.BLOODLUST&&this.cs.n>=8;
      const targets=[...this.enemies.getChildren()];
      if(this.boss&&this.boss.active) targets.push(this.boss);
      targets.forEach(e=>{
        if(!e.active)return;
        const es=e.es??e.bs;
        if(es===ES.DEAD||es===ES.GRAB||es===BS.DEAD)return;
        const ex=e.x,ey=e.y-40;
        if(Math.abs(ex-hb.x)<hb.w/2+18&&Math.abs(ey-hb.y)<hb.h/2+18){
          hb.active=false;
          // Beat multiplier: on-beat = 1.5×, pumped = 1.85×, full drop = 3×
          const beatMul=this.beatSys?.getMultiplier()??1;
          const onBeat=this.beatSys?.registerHit()??false;
          const dmg=Math.round(hb.hd.dmg*(x2?2:1)*beatMul);
          const fd={...hb.hd,dmg};
          const launch=hb.hd.kbY<-280;
          const hit=e instanceof Boss?e.takeDmg(dmg,fd,this.player.x):e.takeDmg(dmg,fd,this.player.x);
          if(hit){
            const hx2=(this.player.x+e.x)/2,hy=e.y-45;
            // On-beat hit: shockwave ring + yellow spark burst
            if(onBeat){this.ie.ring(hx2,hy,C.yellow);this.ie.sparks(hx2,hy,4);}
            this.ie.onHit(hx2,hy,hb.hd,this.player.facing>0,explosive);
            this.ie.flash(e);
            this.ie.dmgTxt(e.x,e.y-90,dmg,launch,x2?C.yellow:(onBeat?C.yellow:null));
            this.cs.hit();
            if(launch)this._pop('LAUNCH!',C.yellow,GW-100,FLOOR_Y-80,false);
            if(this.muts.VAMPIRE){this.player.hp=Math.min(this.player.maxHp,this.player.hp+8);this.events.emit('playerHp',this.player.hp);}
          }
        }
      });
    }

    // ── Thrown enemy chains ───────────────────────────────────────
    const allE=this.enemies.getChildren();
    allE.forEach(te=>{
      if(!te.active||te.es!==ES.THROWN)return;
      allE.forEach(oe=>{
        if(oe===te||!oe.active||oe.es===ES.DEAD)return;
        const range=this.muts.CHAIN?120:55;
        if(Math.abs(te.x-oe.x)<range&&Math.abs(te.y-oe.y)<60){
          const sp={...HITS.THROW,dmg:Math.round(HITS.THROW.dmg*.55)};
          if(oe.takeDmg(sp.dmg,sp,te.x)){this.ie.onHit(oe.x,oe.y-40,sp,te.x<oe.x);this.ie.dmgTxt(oe.x,oe.y-80,sp.dmg,false);this.cs.hit();}
          te.es=ES.LAUNCHED;te._lT=400;
        }
      });
    });

    // ── Boss1 schlong contact damage ─────────────────────────────
    if(this.boss&&this.boss.active&&this.boss.bs===BS.SPRAY&&this.boss._schlong&&this.boss._schlong.active&&this.player&&this.player.active){
      const sg=this.boss._schlong;
      if(!this._schlongDmgCd||this._schlongDmgCd<=0){
        // Horizontal zone check: schlong extends ~70px in facing direction from boss centre
        const sd=this.boss.flipX?-1:1;
        const schlongMinX=this.boss.x+(sd>0?18:-88);
        const schlongMaxX=this.boss.x+(sd>0?88:-18);
        const px=this.player.x;
        const py=this.player.y;
        const inZoneX=(px>Math.min(schlongMinX,schlongMaxX)&&px<Math.max(schlongMinX,schlongMaxX));
        const inZoneY=Math.abs(py-FLOOR_Y)<60;
        if(inZoneX&&inZoneY){
          this.player.hit(14,0,0,this.boss.x);this.ie.flash(this.player);
          this._combatPop('OW! WATCH IT!',C.bZ,this.player.x,this.player.y-70,true);
          this._schlongDmgCd=1100;
        }
      } else {this._schlongDmgCd-=dt;}
    }

    // ── Pee drops (manual update, remove done) ────────────────────
    for(let i=this.peeDrops.length-1;i>=0;i--){
      this.peeDrops[i].update(dt);
      if(this.peeDrops[i]._done)this.peeDrops.splice(i,1);
    }

    // ── Glitter drops (boss2 projectiles) ────────────────────────
    for(let i=this.glitterDrops.length-1;i>=0;i--){
      this.glitterDrops[i].update(dt);
      if(this.glitterDrops[i]._done)this.glitterDrops.splice(i,1);
    }

    // ── Puddle damage (every 300ms via separate timer in Puddle)
    // Check puddles against player
    this.puddles.forEach(p=>p.check(this.player));

    // ── NIGHTCLUB systems ─────────────────────────────────────────
    if(this._clubActive){
      // Beat system tick
      this.beatSys?.update(t,dt);

      // Disco ball pendulum
      if(this.discoBall){
        this.discoBall.update(dt);

        // Player punch hitbox hits disco ball → give it a swing
        if(this.player.hb?.active&&this.discoBall.nearPlayer(this.player.x,this.player.y)){
          this.discoBall.hit(this.player.x);
        }

        // Swinging disco ball hits enemies like a wrecking ball
        const hz=this.discoBall.getHitZone();
        if(hz.active){
          const targets=[...this.enemies.getChildren(),...(this.boss?.active?[this.boss]:[])];
          targets.forEach(e=>{
            if(!e.active)return;
            if(Math.abs(e.x-hz.x)<hz.r+20&&Math.abs((e.y-40)-hz.y)<hz.r+20){
              const dmg=Math.max(12,hz.dmg);
              const hd={...HITS.CROSS,dmg};
              (e instanceof Boss?e.takeDmg(dmg,hd,hz.x):e.takeDmg(dmg,hd,hz.x));
              this.ie.onHit(e.x,e.y-40,hd,hz.x<e.x);
              this.ie.dmgTxt(e.x,e.y-80,dmg,false,C.yellow);
            }
          });
        }
      }

      // DJ Booth proximity + E key activation
      if(this.djBooth&&this._eKey){
        const near=this.djBooth.update(this.player,dt);
        if(near&&Phaser.Input.Keyboard.JustDown(this._eKey)){
          this.djBooth.activate(this.beatSys);
        }
      }
    }

    // ── Kill enemies scoring ──────────────────────────────────────
    // (scoring done in _checkWaveClear)

    // ── Adrenaline: speed boost on kills handled in enemyKilled event
  }
}

// ════════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════════
new Phaser.Game({
  type:Phaser.AUTO, width:GW, height:GH, backgroundColor:'#060211',
  parent:document.body,
  // World gravity → physics handles everything
  physics:{default:'arcade',arcade:{gravity:{y:1200},debug:false}},
  scene:[GameScene],
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
});
</script>
